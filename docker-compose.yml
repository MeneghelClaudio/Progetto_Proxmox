services:
  backend:
    image: 240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam/progetto-proxmox-avengers:backend
    container_name: pmx_backend
    restart: unless-stopped
    environment:
      # ── AWS Secrets Manager ─────────────────────────────────────────────────
      AWS_REGION:            ${AWS_REGION:-}
      AWS_SECRET_NAME:       ${AWS_SECRET_NAME:-}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

      # ── Non-sensitive config ────────────────────────────────────────────────
      CORS_ORIGINS: "*"
    volumes:
      - backend_data:/data
    networks:
      - pmx_net
    expose:
      - "8000"

  frontend:
    image: 240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam/progetto-proxmox-avengers:frontend
    container_name: pmx_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8027:80"
    networks:
      - pmx_net

networks:
  pmx_net:
    driver: bridge

volumes:
  backend_data:
