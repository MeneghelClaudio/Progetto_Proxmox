<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Proxmox Manager · Login</title>
<link rel="stylesheet" href="/css/app.css" />
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 28px; }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { color: var(--text-muted); margin-bottom: 18px; }
  .login-btn { width: 100%; margin-top: 10px; }
</style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">Accedi</h1>
    <p class="login-sub">ProxMox Manager</p>
    <form id="loginForm" autocomplete="on">
      <div style="display:grid;gap:10px">
        <input name="username" required autocomplete="username" class="form-input" placeholder="Username" />
        <input name="password" type="password" required autocomplete="current-password" class="form-input" placeholder="Password" />
      </div>
      <button class="btn btn-primary login-btn">Accedi</button>
      <p id="loginError" style="color:var(--danger);margin-top:10px" class="hidden"></p>
    </form>
  </div>

<script type="module">
import { api, saveToken } from '/js/api.js';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = new URLSearchParams({ username: f.get('username'), password: f.get('password') });
  const err = document.getElementById('loginError');
  err.classList.add('hidden');
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body,
    });
    if (!r.ok) throw new Error((await r.json()).detail || 'Errore');
    const data = await r.json();
    saveToken(data.access_token, data.username, data.role, data.is_admin);
    location.href = '/index.html';
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.remove('hidden');
  }
});
</script>
</body>
</html>
