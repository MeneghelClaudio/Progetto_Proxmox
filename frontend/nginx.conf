server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index login.html;

    # Gzip for assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA-ish routing: if file doesn't exist, fall back to login.html
    location / {
        try_files $uri $uri/ /login.html;
    }

    # Never cache HTML and JS — always serve the latest version
    location ~* \.(html|js)$ {
        try_files $uri $uri/ /login.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ISO / image upload — no body-size cap, long timeouts, no buffering
    # Must come BEFORE the generic /api/ block so Nginx matches it first.
    location ~ ^/api/clusters/\d+/nodes/[^/]+/storage/[^/]+/upload$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size    0;       # unlimited — ISOs can be several GB
        proxy_request_buffering off;     # stream to backend without RAM-buffering
        proxy_read_timeout      7200;    # 2 h — large ISOs on slow links take time
        proxy_send_timeout      7200;
        proxy_connect_timeout   60;
    }

    # REST API (all other endpoints)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # WebSocket for live stats
    location /api/ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
