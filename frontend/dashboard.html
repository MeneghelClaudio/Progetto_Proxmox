<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Dashboard — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css" />
<style>
.overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card-lg {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
  display:flex; flex-direction:column; gap:6px;
}
.stat-card-lg .sc-icon {
  width:36px; height:36px; border-radius:8px;
  display:flex; align-items:center; justify-content:center; margin-bottom:4px;
}
.stat-card-lg .sc-val { font-size:28px; font-weight:800; font-family:var(--mono); line-height:1; }
.stat-card-lg .sc-lbl { font-size:12px; color:var(--text-muted); font-weight:500; }
.stat-card-lg .sc-sub { font-size:11px; color:var(--text-dim); margin-top:2px; }

.node-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
.node-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
  transition:border-color .15s;
}
.node-card:hover { border-color:var(--border2); }
.node-card-header { display:flex; align-items:center; gap:10px; padding:16px 16px 12px; }
.node-card-header h3 { font-size:15px; font-weight:700; }
.node-card-header .node-status { margin-left:auto; }
.node-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 16px 16px; }
.node-metric { display:flex; flex-direction:column; gap:4px; }
.node-metric-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); }
.node-metric-val { font-size:18px; font-weight:700; font-family:var(--mono); }
.node-metric-bar { height:3px; border-radius:2px; background:var(--surface3); overflow:hidden; }
.node-metric-fill { height:100%; border-radius:2px; }
.node-vms { border-top:1px solid var(--border); padding:10px 16px; display:flex; gap:6px; flex-wrap:wrap; }

.cluster-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; }
.cluster-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.cluster-header h3 { font-size:15px; font-weight:700; }
.cluster-nodes { display:flex; gap:8px; flex-wrap:wrap; }
.cluster-node-pill {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
  font-size:12.5px; cursor:pointer; transition:border-color .12s;
  text-decoration:none; color:var(--text);
}
.cluster-node-pill:hover { border-color:var(--accent); color:var(--accent); }

.pbs-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; }
.pbs-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.disk-rack { display:grid; grid-template-columns:repeat(auto-fill,minmax(28px,1fr)); gap:4px; margin-bottom:12px; }
.disk-unit {
  height:36px; border-radius:4px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:10px;
}
.disk-unit.used { background:var(--accent-dim); border-color:var(--accent); }
.disk-unit.free { background:var(--surface2); }

.empty-state {
  background:var(--surface); border:1px dashed var(--border);
  border-radius:var(--radius-lg); padding:48px;
  text-align:center; color:var(--text-muted);
}
.empty-state .material-symbols-rounded { font-size:48px; color:var(--text-dim); margin-bottom:12px; }
.empty-state h3 { font-size:16px; font-weight:700; margin-bottom:8px; color:var(--text); }

.page-actions-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.active-srv-pill {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 12px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
  font-size:12px; color:var(--text-muted);
}
.active-srv-pill .sep { color:var(--text-dim); }
.active-srv-pill .dim { color:var(--text-dim); }
.active-srv-pill .mono { font-family:var(--mono); }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Panoramica completa dell'infrastruttura</p>
      </div>
      <div class="page-actions" id="page-actions"></div>
    </div>

    <div class="overview-grid" id="overview-grid"></div>

    <div class="tabs" id="dash-tabs">
      <div class="tab active" data-tab="nodes" onclick="switchTab('nodes')">
        <span class="material-symbols-rounded">storage</span> Server Fisici
      </div>
      <div class="tab" data-tab="cluster" onclick="switchTab('cluster')">
        <span class="material-symbols-rounded">hub</span> Cluster
      </div>
      <div class="tab" data-tab="backup" onclick="switchTab('backup')">
        <span class="material-symbols-rounded">backup</span> Backup Target
      </div>
    </div>

    <div id="tab-content"></div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
const session = requireAuth();
let DATA = null;   // aggregated across all servers
let ALL_SRV = [];  // raw allClusters response
let _refreshTimer = null;

async function init() {
  buildSidebar('dashboard');  // non-blocking — shell renders instantly

  const creds = await credsApi.list().catch(() => []);
  if (!creds.length) {
    document.getElementById('overview-grid').innerHTML = '';
    document.getElementById('dash-tabs').style.display = 'none';
    document.getElementById('tab-content').innerHTML = `
      <div class="empty-state">
        <span class="material-symbols-rounded">dns</span>
        <h3>Nessun server Proxmox configurato</h3>
        <p>Aggiungi le credenziali di un server Proxmox per iniziare.</p>
        <a href="servers.html" class="btn btn-primary" style="margin-top:16px">
          <span class="material-symbols-rounded">add</span> Aggiungi server Proxmox
        </a>
      </div>`;
    return;
  }

  await ensureActiveCred();

  ALL_SRV = await ensureAllClusters();
  DATA = aggregateAll(ALL_SRV);

  if (can(session, 'add_server')) {
    document.getElementById('page-actions').innerHTML = `
      <div class="page-actions-row">
        <a href="servers.html" class="btn btn-secondary">
          <span class="material-symbols-rounded">dns</span>
          <span>Gestisci Server</span>
        </a>
        <a href="servers.html?new=1" class="btn btn-primary">
          <span class="material-symbols-rounded">add</span>
          <span>Aggiungi Server</span>
        </a>
      </div>`;
  }

  renderOverview();
  switchTab('nodes');

  // Auto-refresh every 30 s
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(async () => {
    try {
      ALL_SRV = await refreshAllClusters();
      DATA = aggregateAll(ALL_SRV);
      renderOverview();
      const activeTab = document.querySelector('.tab.active')?.dataset?.tab || 'nodes';
      switchTab(activeTab);
    } catch { /* silent */ }
  }, 30000);
}

// Merge all per-server trees into one DATA object.
// Nodes/VMs carry server_id to avoid ID collisions across servers.
function aggregateAll(allSrv) {
  const nodes = [], vms = [], clusters = [], backupServers = [];

  allSrv.forEach(srv => {
    if (!srv.tree) return;
    const t = srv.tree;

    t.nodes.forEach(n => nodes.push({ ...n, server_id: srv.cred_id, server_name: srv.cred_name }));
    t.vms.forEach(v => vms.push({ ...v, server_id: srv.cred_id }));

    if (t.clusters.length) {
      t.clusters.forEach(c => clusters.push({ ...c, server_id: srv.cred_id, server_name: srv.cred_name }));
    } else if (t.nodes.length) {
      // Standalone server — show as a pseudo-cluster entry in the Cluster tab
      clusters.push({
        id: 'standalone-' + srv.cred_id,
        name: srv.cred_name,
        nodes: t.nodes.map(n => n.id),
        status: 'ok',
        server_id: srv.cred_id,
        server_name: srv.cred_name,
        standalone: true,
      });
    }

    t.backupServers.forEach(b => backupServers.push({ ...b, server_name: srv.cred_name }));
  });

  return { nodes, vms, clusters, backupServers };
}

function renderOverview() {
  const d = DATA;
  const onlineSrv = ALL_SRV.filter(s => s.online).length;
  const nodesUp   = d.nodes.filter(n => n.status === 'running').length;
  const totalVMs  = d.vms.filter(v => v.type === 'vm').length;
  const totalCTs  = d.vms.filter(v => v.type === 'ct').length;

  const cards = [
    { icon:'dns',           color:'var(--accent)',  bg:'var(--accent-dim)',  val: ALL_SRV.length,   lbl:'Server Proxmox',    sub:`${onlineSrv} online` },
    { icon:'storage',       color:'var(--info)',    bg:'var(--info-dim)',    val: d.nodes.length,   lbl:'Nodi Fisici',       sub:`${nodesUp} online` },
    { icon:'computer',      color:'var(--accent)',  bg:'var(--accent-dim)',  val: totalVMs,         lbl:'Macchine Virtuali', sub:`${d.vms.filter(v=>v.type==='vm'&&v.status==='running').length} running` },
    { icon:'deployed_code', color:'#5dd05d',        bg:'#0c2e0c',            val: totalCTs,         lbl:'Container',         sub:`${d.vms.filter(v=>v.type==='ct'&&v.status==='running').length} running` },
    { icon:'backup',        color:'var(--success)', bg:'var(--success-dim)', val: d.backupServers.length, lbl:'Backup Target', sub: d.backupServers.length ? 'configurati' : 'nessuno' },
  ];
  document.getElementById('overview-grid').innerHTML = cards.map(c => `
    <div class="stat-card-lg">
      <div class="sc-icon" style="background:${c.bg}">
        <span class="material-symbols-rounded" style="color:${c.color};font-size:20px">${c.icon}</span>
      </div>
      <div class="sc-val" style="color:${c.color}">${c.val}</div>
      <div class="sc-lbl">${c.lbl}</div>
      <div class="sc-sub">${c.sub}</div>
    </div>`).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const el = document.getElementById('tab-content');
  if (tab === 'nodes')   el.innerHTML = renderNodes();
  if (tab === 'cluster') el.innerHTML = renderClusters();
  if (tab === 'backup')  el.innerHTML = renderBackup();
}

function barColor(pct) {
  if (pct > 80) return 'var(--danger)';
  if (pct > 60) return 'var(--warning)';
  return 'var(--success)';
}

function renderNodes() {
  if (!DATA.nodes.length) {
    return `<div class="empty-state"><span class="material-symbols-rounded">storage</span><h3>Nessun nodo disponibile</h3></div>`;
  }
  const multiServer = ALL_SRV.length > 1;
  return `<div class="node-grid">${DATA.nodes.map(node => {
    const vms = DATA.vms.filter(v => v.node === node.id && v.server_id === node.server_id);
    const vmList = vms.slice(0, 6).map(v => `
      <a href="vm-detail.html?id=${v.id}" class="chip ${v.status === 'running' ? 'chip-running' : 'chip-stopped'}" style="text-decoration:none">
        <span class="material-symbols-rounded" style="font-size:12px">${v.type === 'vm' ? 'computer' : 'deployed_code'}</span>
        ${escapeHtml(v.name)}
      </a>`).join('');
    const serverBadge = multiServer
      ? `<span class="chip" style="font-size:10px;background:var(--surface3);color:var(--text-muted)">${escapeHtml(node.server_name)}</span>`
      : '';
    return `<div class="node-card">
      <div class="node-card-header">
        <span class="material-symbols-rounded" style="color:${node.status === 'running' ? 'var(--success)' : 'var(--text-dim)'}">storage</span>
        <div style="flex:1;min-width:0">
          <h3><a href="node-detail.html?id=${node.id}" style="color:var(--text);text-decoration:none">${escapeHtml(node.name)}</a></h3>
          <div class="text-xs text-muted">Uptime: ${node.uptime}</div>
        </div>
        ${serverBadge}
        <span class="node-status">
          <span class="chip ${node.status === 'running' ? 'chip-running' : 'chip-stopped'}">${node.status}</span>
        </span>
      </div>
      <div class="node-metrics">
        ${['cpu','mem','disk'].map(m => `<div class="node-metric">
          <span class="node-metric-label">${m.toUpperCase()}</span>
          <span class="node-metric-val" style="color:${barColor(node[m])}">${node[m]}%</span>
          <div class="node-metric-bar"><div class="node-metric-fill" style="width:${node[m]}%;background:${barColor(node[m])}"></div></div>
        </div>`).join('')}
      </div>
      <div class="node-vms">${vmList}${vms.length > 6 ? `<span class="chip chip-stopped">+${vms.length - 6}</span>` : ''}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderClusters() {
  if (!DATA.clusters.length) {
    return `<div class="empty-state"><span class="material-symbols-rounded">hub</span><h3>Nessun cluster o server disponibile</h3></div>`;
  }
  return `<div class="node-grid">${DATA.clusters.map(cl => {
    const clNodes = DATA.nodes.filter(n => cl.nodes.includes(n.id) && n.server_id === cl.server_id);
    const pills = clNodes.map(n => `
      <a href="node-detail.html?id=${n.id}" class="cluster-node-pill">
        <span class="status-dot ${n.status === 'running' ? 'running' : 'stopped'}"></span>
        ${escapeHtml(n.name)}
        <span class="text-xs text-muted">${DATA.vms.filter(v => v.node === n.id && v.server_id === cl.server_id).length} VM/CT</span>
      </a>`).join('');
    const icon = cl.standalone ? 'dns' : 'hub';
    const iconColor = cl.standalone ? 'var(--accent)' : 'var(--info)';
    const typeLabel = cl.standalone
      ? `<span class="chip" style="font-size:10px;background:var(--surface3);color:var(--text-muted)">standalone</span>`
      : `<span class="chip ${cl.status === 'ok' ? 'chip-running' : 'chip-paused'}" style="margin-left:auto">${cl.status}</span>`;
    return `<div class="cluster-card">
      <div class="cluster-header">
        <span class="material-symbols-rounded" style="color:${iconColor}">${icon}</span>
        <h3>${escapeHtml(cl.name)}</h3>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">${typeLabel}</div>
      </div>
      <div class="cluster-nodes">${pills || '<span style="font-size:12px;color:var(--text-dim)">Nessun nodo online</span>'}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderBackup() {
  if (!DATA.backupServers.length) {
    return `<div class="empty-state"><span class="material-symbols-rounded">backup</span><h3>Nessun backup target</h3><p>Non sono configurati storage di backup.</p></div>`;
  }
  const multiServer = ALL_SRV.length > 1;
  return `<div class="node-grid">${DATA.backupServers.map(bs => {
    const pct = bs.diskTotal ? Math.round(bs.diskUsed / bs.diskTotal * 100) : 0;
    const total = Math.round(bs.diskTotal / 1024);
    const used = Math.round(bs.diskUsed / 1024);
    const diskCount = 8;
    const usedDisks = Math.round(pct / 100 * diskCount);
    const disks = Array.from({ length: diskCount }, (_, i) => `
      <div class="disk-unit ${i < usedDisks ? 'used' : 'free'}">
        <span class="material-symbols-rounded" style="font-size:14px;color:${i < usedDisks ? 'var(--accent)' : 'var(--text-dim)'}">storage</span>
      </div>`).join('');
    const serverBadge = multiServer
      ? `<span class="chip" style="font-size:10px;background:var(--surface3);color:var(--text-muted)">${escapeHtml(bs.server_name)}</span>`
      : '';
    return `<div class="pbs-card">
      <div class="pbs-header">
        <span class="material-symbols-rounded" style="color:var(--warning)">backup</span>
        <h3>${escapeHtml(bs.name)}</h3>
        ${serverBadge}
        <span class="chip chip-running" style="margin-left:auto">${bs.status}</span>
      </div>
      <div class="disk-rack">${disks}</div>
      <div class="flex items-center justify-between mb-8">
        <span class="text-sm text-muted">Spazio utilizzato</span>
        <span class="font-mono text-sm" style="color:${barColor(pct)}">${pct}%</span>
      </div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>
      <div class="text-xs text-muted mt-8">${used} GB / ${total} GB</div>
    </div>`;
  }).join('')}</div>`;
}

init();
</script>
</body>
</html>
