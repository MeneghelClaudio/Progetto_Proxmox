<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Backup & Snapshot — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.backup-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; margin-bottom:24px; }
.pbs-detail-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
}
.pbs-title { font-size:15px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
.disk-row { display:flex; gap:4px; flex-wrap:wrap; margin:12px 0; }
.disk-icon {
  width:32px; height:38px; border-radius:4px;
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:2px;
}
.disk-icon.used   { background:var(--accent-dim); border-color:var(--accent); }
.disk-icon.free   { background:var(--surface2); }
.disk-icon span   { font-size:12px; }

.snap-row {
  display:flex; align-items:flex-start; gap:14px;
  padding:12px 0; border-bottom:1px solid var(--border);
}
.snap-row:last-child { border-bottom:none; }
.snap-dot-col { display:flex; flex-direction:column; align-items:center; padding-top:4px; }
.snap-dot { width:12px; height:12px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.snap-line { width:2px; flex:1; background:var(--border); min-height:20px; margin-top:4px; }
.snap-content { flex:1; }
.snap-name { font-size:13.5px; font-weight:600; }
.snap-meta { font-size:11px; color:var(--text-muted); font-family:var(--mono); margin-top:2px; }
.snap-desc-text { font-size:12px; color:var(--text-muted); margin-top:4px; }
.snap-actions { display:flex; gap:6px; margin-top:8px; }

.empty-state {
  background:var(--surface); border:1px dashed var(--border);
  border-radius:var(--radius-lg); padding:48px;
  text-align:center; color:var(--text-muted);
}
.empty-state .material-symbols-rounded { font-size:48px; color:var(--text-dim); margin-bottom:12px; }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Backup &amp; Snapshot</h1>
        <p class="page-subtitle">Gestione backup manuali e snapshot di tutte le VM/CT</p>
      </div>
      <div class="page-actions" id="page-actions"></div>
    </div>

    <!-- Backup targets overview -->
    <div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span class="material-symbols-rounded" style="font-size:18px;color:var(--warning)">backup</span>
      Storage di Backup
    </div>
    <div class="backup-grid" id="pbs-grid"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="snapshots" onclick="switchTab('snapshots')">
        <span class="material-symbols-rounded">camera</span> Snapshot per VM
      </div>
      <div class="tab" data-tab="backups" onclick="switchTab('backups')">
        <span class="material-symbols-rounded">archive</span> Backup disponibili
      </div>
    </div>
    <div id="tab-content"></div>

    <!-- Modal: manual backup -->
    <div class="modal-overlay hidden" id="modal-backup">
      <div class="modal">
        <div class="modal-title"><span class="material-symbols-rounded" style="vertical-align:middle;margin-right:6px">backup</span>Backup manuale</div>
        <div class="form-group">
          <label class="form-label">VM / Container</label>
          <select class="form-input" id="backup-vm"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Storage destinazione</label>
          <select class="form-input" id="backup-storage"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Modalità</label>
          <select class="form-input" id="backup-mode">
            <option value="snapshot">Snapshot (live)</option>
            <option value="suspend">Suspend</option>
            <option value="stop">Stop</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Compressione</label>
          <select class="form-input" id="backup-compress">
            <option value="zstd">zstd (consigliato)</option>
            <option value="lzo">lzo</option>
            <option value="gzip">gzip</option>
            <option value="0">nessuna</option>
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-backup')">Annulla</button>
          <button class="btn btn-primary" onclick="startBackup()">
            <span class="material-symbols-rounded">play_arrow</span> Avvia backup
          </button>
        </div>
      </div>
    </div>

    <!-- Modal: snapshot -->
    <div class="modal-overlay hidden" id="modal-snapshot">
      <div class="modal">
        <div class="modal-title"><span class="material-symbols-rounded" style="vertical-align:middle;margin-right:6px">camera</span>Nuovo Snapshot</div>
        <div class="form-group">
          <label class="form-label">VM / Container</label>
          <select class="form-input" id="snap-vm"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Nome snapshot</label>
          <input type="text" class="form-input" id="snap-name" placeholder="es. pre-update"/>
        </div>
        <div class="form-group">
          <label class="form-label">Descrizione</label>
          <input type="text" class="form-input" id="snap-desc" placeholder="Descrizione..."/>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-snapshot')">Annulla</button>
          <button class="btn btn-primary" onclick="createSnapshot()">
            <span class="material-symbols-rounded">camera</span> Crea
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="api.js?v=3"></script>
<script src="shared.js?v=3"></script>
<script src="sidebar.js?v=3"></script>
<script>
const session = requireAuth();
let DATA = null;
let BACKUP_TARGETS = [];   // from tree.backup_targets
let ALL_SNAPS = [];        // [{vm, kind, node, snap}]

async function init() {
  await buildSidebar('backup');
  const credId = await ensureActiveCred();
  if (!credId) {
    document.getElementById('tab-content').innerHTML = '<div class="card"><p class="text-muted">Nessun server Proxmox configurato.</p></div>';
    return;
  }
  DATA = await ensureClusterData();
  BACKUP_TARGETS = CLUSTER_RAW?.backup_targets || [];

  // Fill action buttons based on role
  const pa = document.getElementById('page-actions');
  let html = '';
  if (can(session, 'start') /* senior+ */ ) {
    html += `<button class="btn btn-secondary" onclick="openBackupModal()">
      <span class="material-symbols-rounded">backup</span> Backup manuale
    </button>`;
  }
  if (can(session, 'snapshot_create')) {
    html += `<button class="btn btn-primary" onclick="openSnapshotModal()">
      <span class="material-symbols-rounded">camera</span> Nuovo snapshot
    </button>`;
  }
  pa.innerHTML = html;

  renderPBS();
  switchTab('snapshots');
  await loadAllSnapshots();
}

function barColor(p) { return p > 80 ? 'var(--danger)' : p > 60 ? 'var(--warning)' : 'var(--success)'; }

function renderPBS() {
  const el = document.getElementById('pbs-grid');
  if (!BACKUP_TARGETS.length) {
    el.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded">backup</span><div>Nessun storage di backup configurato sui nodi.</div></div>`;
    return;
  }
  el.innerHTML = BACKUP_TARGETS.map(bt => {
    const used = bt.used || 0;
    const total = bt.total || 1;
    const pct = Math.round(used / total * 100);
    const col = barColor(pct);
    const usedGB = Math.round(used / (1024 ** 3));
    const totalGB = Math.round(total / (1024 ** 3));
    const freeGB = Math.max(0, totalGB - usedGB);
    const diskCount = 8;
    const usedDisks = Math.round(pct / 100 * diskCount);
    const disks = Array.from({ length: diskCount }, (_, i) => `
      <div class="disk-icon ${i < usedDisks ? 'used' : 'free'}">
        <span class="material-symbols-rounded" style="font-size:14px;color:${i < usedDisks ? 'var(--accent)' : 'var(--text-dim)'}">hard_drive</span>
        <span style="font-size:8px;color:${i < usedDisks ? 'var(--accent)' : 'var(--text-dim)'}">${i < usedDisks ? 'IN USE' : 'FREE'}</span>
      </div>`).join('');
    return `<div class="pbs-detail-card">
      <div class="pbs-title">
        <span class="material-symbols-rounded" style="color:var(--warning)">backup</span>
        ${escapeHtml(bt.storage)}
        <span class="chip chip-running" style="margin-left:auto">${escapeHtml(bt.node)}</span>
      </div>
      <div class="disk-row">${disks}</div>
      <div class="flex items-center justify-between mb-8">
        <span class="text-sm text-muted">Utilizzo disco</span>
        <span class="font-mono text-sm" style="color:${col}">${pct}%</span>
      </div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="flex items-center justify-between mt-8">
        <span class="text-xs text-muted">Usato: <b>${usedGB} GB</b></span>
        <span class="text-xs text-muted">Libero: <b>${freeGB} GB</b></span>
        <span class="text-xs text-muted">Totale: <b>${totalGB} GB</b></span>
      </div>
    </div>`;
  }).join('');
}

async function loadAllSnapshots() {
  ALL_SNAPS = [];
  const credId = getActiveCred();
  for (const vm of DATA.vms) {
    try {
      const snaps = await snapApi.list(credId, vm.kind, vm.node, vm.id);
      snaps.filter(s => s.name !== 'current').forEach(s => {
        ALL_SNAPS.push({ vm, snap: s });
      });
    } catch { /* ignore */ }
  }
  if (document.querySelector('.tab[data-tab="snapshots"].active')) {
    document.getElementById('tab-content').innerHTML = renderSnapshots();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const el = document.getElementById('tab-content');
  if (tab === 'snapshots') el.innerHTML = renderSnapshots();
  if (tab === 'backups')   el.innerHTML = renderBackupsList();
}

function renderSnapshots() {
  const sorted = [...ALL_SNAPS].sort((a, b) => (b.snap.snaptime || 0) - (a.snap.snaptime || 0));
  if (!sorted.length) {
    return `<div class="empty-state"><span class="material-symbols-rounded">camera</span><h3>Nessuno snapshot</h3><p>Crea uno snapshot dal menu o dalla pagina di una VM.</p></div>`;
  }
  return `<div class="card">
    <div class="card-header">
      <span class="material-symbols-rounded" style="font-size:18px;color:var(--accent)">camera</span>
      <span class="card-title">Tutti gli snapshot (${sorted.length})</span>
    </div>
    ${sorted.map((item, i) => {
      const date = item.snap.snaptime ? new Date(item.snap.snaptime * 1000).toISOString().slice(0, 16).replace('T', ' ') : '';
      return `<div class="snap-row">
        <div class="snap-dot-col">
          <div class="snap-dot"></div>
          ${i < sorted.length - 1 ? '<div class="snap-line"></div>' : ''}
        </div>
        <div class="snap-content">
          <div class="snap-name">${escapeHtml(item.snap.name)}</div>
          <div class="snap-meta">${date} &nbsp;·&nbsp; VM: ${escapeHtml(item.vm.name)} (${item.vm.id}) &nbsp;·&nbsp; Nodo: ${escapeHtml(item.vm.node)}</div>
          <div class="snap-desc-text">${escapeHtml(item.snap.description || '')}</div>
          ${can(session, 'start') ? `<div class="snap-actions">
            <button class="btn btn-sm btn-success" onclick="rollbackSnap(${item.vm.id},'${encodeURIComponent(item.snap.name)}')">
              <span class="material-symbols-rounded">restore</span> Ripristina
            </button>
            ${can(session, 'snapshot_delete') ? `<button class="btn btn-sm btn-danger" onclick="deleteSnap(${item.vm.id},'${encodeURIComponent(item.snap.name)}')">
              <span class="material-symbols-rounded">delete</span>
            </button>` : ''}
          </div>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderBackupsList() {
  if (!BACKUP_TARGETS.length) {
    return `<div class="empty-state"><span class="material-symbols-rounded">archive</span><h3>Nessuno storage di backup</h3></div>`;
  }
  return `<div class="card">
    <div class="card-header">
      <span class="material-symbols-rounded" style="font-size:18px;color:var(--accent)">archive</span>
      <span class="card-title">Backup disponibili per storage</span>
    </div>
    <div id="backups-per-storage">
      ${BACKUP_TARGETS.map(bt => `
        <div style="margin-bottom:16px">
          <h4 style="font-size:13px;font-weight:700;margin-bottom:8px">${escapeHtml(bt.node)} / ${escapeHtml(bt.storage)}</h4>
          <div id="bk-${escapeHtml(bt.node)}-${escapeHtml(bt.storage)}" class="text-muted text-sm">Caricamento...</div>
        </div>`).join('')}
    </div>
  </div>`;
}

async function loadBackupsForEachStorage() {
  const credId = getActiveCred();
  for (const bt of BACKUP_TARGETS) {
    const id = `bk-${bt.node}-${bt.storage}`.replace(/[^a-zA-Z0-9-]/g, '_');
    const el = document.getElementById(id);
    if (!el) continue;
    try {
      const items = await backupApi.list(credId, bt.node, bt.storage);
      if (!items.length) { el.innerHTML = '<span class="text-muted">Nessun backup.</span>'; continue; }
      el.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Volume</th><th>VMID</th><th>Data</th><th>Dimensione</th></tr></thead>
        <tbody>${items.map(b => `<tr>
          <td class="mono text-sm">${escapeHtml(b.volid || '')}</td>
          <td class="mono">${b.vmid || ''}</td>
          <td class="mono text-sm">${b.ctime ? new Date(b.ctime * 1000).toISOString().slice(0, 16).replace('T', ' ') : ''}</td>
          <td>${b.size ? (Math.round(b.size / (1024 ** 2)) + ' MB') : ''}</td>
        </tr>`).join('')}</tbody></table></div>`;
    } catch (e) {
      el.innerHTML = `<span class="text-danger">${escapeHtml(e.message)}</span>`;
    }
  }
}

// --- Modals ---

function openBackupModal() {
  const vmSel = document.getElementById('backup-vm');
  vmSel.innerHTML = DATA.vms.map(v => `<option value="${v.id}">${escapeHtml(v.name)} (${v.id}) - ${escapeHtml(v.node)}</option>`).join('');
  const storSel = document.getElementById('backup-storage');
  storSel.innerHTML = BACKUP_TARGETS.map(bt => `<option value="${bt.node}|${bt.storage}">${escapeHtml(bt.storage)} (${escapeHtml(bt.node)})</option>`).join('');
  if (!BACKUP_TARGETS.length) {
    showToast('Nessuno storage di backup disponibile', 'warning');
    return;
  }
  openModal('modal-backup');
}

function openSnapshotModal() {
  const vmSel = document.getElementById('snap-vm');
  vmSel.innerHTML = DATA.vms.map(v => `<option value="${v.id}">${escapeHtml(v.name)} (${v.id}) - ${escapeHtml(v.node)}</option>`).join('');
  document.getElementById('snap-name').value = '';
  document.getElementById('snap-desc').value = '';
  openModal('modal-snapshot');
}

async function startBackup() {
  const vmId = parseInt(document.getElementById('backup-vm').value);
  const vm = DATA.vms.find(v => v.id === vmId);
  if (!vm) return;
  const storageSel = document.getElementById('backup-storage').value.split('|');
  const node = storageSel[0];
  const storage = storageSel[1];
  const mode = document.getElementById('backup-mode').value;
  const compress = document.getElementById('backup-compress').value;
  try {
    await backupApi.create(getActiveCred(), node, vm.id, {
      storage, mode, compress, notes: null,
    });
    closeModal('modal-backup');
    showToast('Backup avviato', 'success');
  } catch (e) {
    showToast('Errore: ' + e.message, 'danger');
  }
}

async function createSnapshot() {
  const vmId = parseInt(document.getElementById('snap-vm').value);
  const vm = DATA.vms.find(v => v.id === vmId);
  if (!vm) return;
  const name = document.getElementById('snap-name').value || 'snapshot';
  const desc = document.getElementById('snap-desc').value;
  try {
    await snapApi.create(getActiveCred(), vm.kind, vm.node, vm.id, {
      snapname: name, description: desc,
    });
    closeModal('modal-snapshot');
    showToast(`Snapshot "${name}" creato`, 'success');
    await loadAllSnapshots();
  } catch (e) {
    showToast('Errore: ' + e.message, 'danger');
  }
}

async function rollbackSnap(vmId, nameEnc) {
  const vm = DATA.vms.find(v => v.id === vmId);
  if (!vm) return;
  const name = decodeURIComponent(nameEnc);
  if (!confirm(`Ripristinare "${name}" su ${vm.name}?`)) return;
  try {
    await snapApi.rollback(getActiveCred(), vm.kind, vm.node, vm.id, name);
    showToast('Rollback avviato', 'info');
  } catch (e) { showToast('Errore: ' + e.message, 'danger'); }
}

async function deleteSnap(vmId, nameEnc) {
  const vm = DATA.vms.find(v => v.id === vmId);
  if (!vm) return;
  const name = decodeURIComponent(nameEnc);
  if (!confirm(`Eliminare lo snapshot "${name}"?`)) return;
  try {
    await snapApi.remove(getActiveCred(), vm.kind, vm.node, vm.id, name);
    showToast('Snapshot eliminato', 'warning');
    await loadAllSnapshots();
  } catch (e) { showToast('Errore: ' + e.message, 'danger'); }
}

function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

init();

// When user clicks "Backup disponibili" tab, lazy-load actual backups
document.addEventListener('click', (e) => {
  const tab = e.target.closest('.tab[data-tab="backups"]');
  if (tab) setTimeout(loadBackupsForEachStorage, 50);
});
</script>
</body>
</html>
