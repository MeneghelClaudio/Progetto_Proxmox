<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard — ProxMox Manager</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app-shell-main">
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">P</div>
      <span>ProxMox Manager</span>
    </div>
    <select id="credSelect" class="form-input topbar-select">
      <option value="">Seleziona cluster…</option>
    </select>
    <button id="addCredBtn" class="btn btn-primary btn-sm">+ Aggiungi</button>
    <button id="usersBtn" class="btn btn-secondary btn-sm hidden">Utenti</button>
    <div class="topbar-sep"></div>
    <span id="userLabel" class="text-muted"></span>
    <button id="logoutBtn" class="btn btn-secondary btn-sm">Esci</button>
  </header>

  <div class="content-grid">
    <aside id="sidebar" class="sidebar-panel">
      <div id="tree"></div>
    </aside>

    <main class="main">
      <div class="tabs">
        <button data-tab="phys" class="tab-btn tab active">Server fisici</button>
        <button data-tab="cluster" class="tab-btn tab">Cluster</button>
        <button data-tab="backup" class="tab-btn tab">Backup</button>
      </div>
      <section id="tab-phys" class="tab-pane"></section>
      <section id="tab-cluster" class="tab-pane hidden"></section>
      <section id="tab-backup" class="tab-pane hidden"></section>
    </main>

    <aside id="detail" class="detail-panel">
      <div class="padded text-muted">Seleziona un elemento dall'albero per vederne i dettagli.</div>
    </aside>
  </div>

  <footer id="taskbar" class="taskbar">
    <span class="text-muted">Operazioni:</span>
    <div id="taskbarItems" class="taskbar-items"></div>
    <span id="taskbarIdle" class="text-muted">nessuna in corso</span>
  </footer>
</div>

<div id="modalRoot"></div>
<script type="module" src="/js/main.js"></script>
</body>
</html>
