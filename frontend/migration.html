<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Migrazione — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.migration-layout { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; }
.node-drop-zone {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden; min-height:400px;
}
.drop-zone-header {
  padding:14px 18px; background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.drop-zone-header h3 { font-size:14px; font-weight:700; }
.drop-zone-stats { display:flex; gap:16px; margin-left:auto; }
.dz-stat { font-size:11px; color:var(--text-muted); }
.dz-stat b { color:var(--text); }
.drop-zone-body { padding:12px; min-height:300px; }
.drop-zone-body.drag-over { background:var(--accent-dim); border:2px dashed var(--accent); }
.vm-drag-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; margin-bottom:6px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); cursor:grab;
  transition:all .15s; user-select:none;
}
.vm-drag-item:active { cursor:grabbing; opacity:.7; }
.vm-drag-item:hover { border-color:var(--border2); }
.vm-drag-item.dragging { opacity:.4; border-style:dashed; }
.vm-drag-item .vdi-icon { font-size:18px; flex-shrink:0; }
.vm-drag-item .vdi-info { flex:1; min-width:0; }
.vm-drag-item .vdi-name { font-size:13px; font-weight:600; }
.vm-drag-item .vdi-meta { font-size:11px; color:var(--text-muted); font-family:var(--mono); }

.migration-log {
  margin-top:20px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:16px;
}
.log-header { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); margin-bottom:10px; }
.log-scroll { max-height:240px; overflow-y:auto; }
.log-entry {
  font-family:var(--mono); font-size:12px; padding:4px 0;
  border-bottom:1px solid var(--border); display:flex; gap:10px;
}
.log-entry:last-child { border-bottom:none; }
.log-time { color:var(--text-dim); flex-shrink:0; }
.log-msg  { color:var(--text); word-break:break-all; }
.log-msg.success { color:var(--success); }
.log-msg.error   { color:var(--danger); }
.log-msg.info    { color:var(--info); }

.task-bar {
  display:flex; align-items:center; gap:12px;
  padding:10px 14px; margin-bottom:8px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius);
}
.task-bar .task-progress-wrap { flex:1; }
.task-progress {
  height:6px; border-radius:3px; background:var(--surface3); overflow:hidden;
}
.task-progress-fill { height:100%; background:var(--accent); transition:width .3s; }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Migrazione VM &amp; Container</h1>
        <p class="page-subtitle">Trascina VM e container tra i nodi del cluster</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary" onclick="reloadAll()">
          <span class="material-symbols-rounded">refresh</span> Aggiorna
        </button>
      </div>
    </div>

    <!-- Active tasks -->
    <div id="active-tasks"></div>

    <!-- Node drop zones -->
    <div class="migration-layout" id="migration-layout"></div>

    <!-- Migration log -->
    <div class="migration-log">
      <div class="log-header">Log operazioni</div>
      <div class="log-scroll" id="migration-log-scroll">
        <div class="log-entry"><span class="log-time">--:--:--</span><span class="log-msg info">Sistema pronto. Trascina una VM verso un nodo di destinazione per avviare la migrazione.</span></div>
      </div>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
const session = requireAuth();
if (!can(session, 'migration')) {
  showToast('Accesso negato', 'danger');
  setTimeout(() => location.href = 'dashboard.html', 1500);
}

let DATA = null;
let draggedVM = null;
let dragSourceNode = null;
let activePolling = null;

async function init() {
  await buildSidebar('migration');
  const credId = await ensureActiveCred();
  if (!credId) {
    document.getElementById('migration-layout').innerHTML = '<div class="card"><p class="text-muted">Nessun server Proxmox configurato. <a href="servers.html" style="color:var(--accent)">Aggiungine uno</a>.</p></div>';
    return;
  }
  DATA = await ensureClusterData();
  renderLayout();
  startTaskPolling();
}

function barColor(p) { return p > 80 ? 'var(--danger)' : p > 60 ? 'var(--warning)' : 'var(--success)'; }

function renderLayout() {
  const el = document.getElementById('migration-layout');
  if (!DATA.nodes.length) {
    el.innerHTML = '<div class="card"><p class="text-muted">Nessun nodo disponibile.</p></div>';
    return;
  }
  el.innerHTML = DATA.nodes.map(node => {
    const vms = DATA.vms.filter(v => v.node === node.id);
    const vmItems = vms.map(vm => `
      <div class="vm-drag-item" draggable="true"
        data-vm-id="${vm.id}"
        data-vm-kind="${vm.kind}"
        data-source-node="${node.id}"
        ondragstart="onDragStart(event)"
        ondragend="onDragEnd(event)">
        <span class="material-symbols-rounded vdi-icon" style="color:${vm.status === 'running' ? 'var(--success)' : 'var(--text-dim)'}">
          ${vm.type === 'vm' ? 'computer' : 'deployed_code'}
        </span>
        <div class="vdi-info">
          <div class="vdi-name">${escapeHtml(vm.name)}</div>
          <div class="vdi-meta">${vm.type.toUpperCase()} · ${vm.id}</div>
        </div>
        <span class="chip ${vm.status === 'running' ? 'chip-running' : 'chip-stopped'}" style="flex-shrink:0">${vm.status}</span>
        <span class="material-symbols-rounded" style="font-size:16px;color:var(--text-dim)">drag_indicator</span>
      </div>`).join('');
    return `<div class="node-drop-zone">
      <div class="drop-zone-header">
        <span class="material-symbols-rounded" style="color:${node.status === 'running' ? 'var(--success)' : 'var(--text-dim)'}">storage</span>
        <h3>${escapeHtml(node.name)}</h3>
        <div class="drop-zone-stats">
          <span class="dz-stat">CPU: <b style="color:${barColor(node.cpu)}">${node.cpu}%</b></span>
          <span class="dz-stat">RAM: <b style="color:${barColor(node.mem)}">${node.mem}%</b></span>
          <span class="dz-stat"><b>${vms.length}</b> macchine</span>
        </div>
      </div>
      <div class="drop-zone-body" data-node-id="${node.id}"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,this)">
        ${vmItems}
        ${vms.length === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:12px">Nessuna VM su questo nodo<br>(rilascia qui per migrare)</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

function onDragStart(e) {
  draggedVM = {
    id: parseInt(e.currentTarget.dataset.vmId),
    kind: e.currentTarget.dataset.vmKind,
  };
  dragSourceNode = e.currentTarget.dataset.sourceNode;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drop-zone-body').forEach(z => z.classList.remove('drag-over'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function onDrop(e, zone) {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const targetNode = zone.dataset.nodeId;
  if (!draggedVM || targetNode === dragSourceNode) return;
  const vm = DATA.vms.find(v => v.id === draggedVM.id);
  if (!vm) return;

  try {
    const task = await vmsApi.migrate(getActiveCred(), vm.kind, vm.node, vm.id, {
      target_node: targetNode,
      online: vm.status === 'running',
      with_local_disks: true,
    });
    addLog(`Migrazione avviata: ${vm.name} (${vm.type.toUpperCase()}) da ${vm.node} → ${targetNode}`, 'info');
    showToast(`Migrazione di ${vm.name} avviata`, 'info');
  } catch (err) {
    addLog(`Errore migrazione ${vm.name}: ${err.message}`, 'error');
    showToast('Errore: ' + err.message, 'danger');
  }

  draggedVM = null;
  dragSourceNode = null;
}

function addLog(msg, type = 'info') {
  const scroll = document.getElementById('migration-log-scroll');
  const now = new Date().toLocaleTimeString('it-IT');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${escapeHtml(msg)}</span>`;
  scroll.insertBefore(div, scroll.firstChild);
}

async function startTaskPolling() {
  async function tick() {
    try {
      const tasks = await tasksApi.list(false);
      renderTasks(tasks);
      const running = tasks.filter(t => t.status === 'pending' || t.status === 'running');
      if (running.length === 0) {
        // refresh cluster data once running tasks finish
        if (activePolling && activePolling.wasRunning) {
          await refreshClusterData();
          DATA = CLUSTER_DATA;
          renderLayout();
        }
        activePolling = { wasRunning: false };
      } else {
        activePolling = { wasRunning: true };
      }
    } catch {}
  }
  tick();
  setInterval(tick, 3000);
}

function renderTasks(tasks) {
  const running = tasks.filter(t => t.status === 'pending' || t.status === 'running').slice(0, 5);
  const done = tasks.filter(t => t.status !== 'pending' && t.status !== 'running').slice(0, 3);
  const el = document.getElementById('active-tasks');
  if (!running.length && !done.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div style="margin-bottom:16px">
    ${running.map(t => `
      <div class="task-bar">
        <span class="material-symbols-rounded" style="color:var(--accent)">swap_horiz</span>
        <div class="task-progress-wrap">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
            <span><b>${escapeHtml(t.kind.toUpperCase())} ${t.vmid}</b> · ${escapeHtml(t.source_node)} → ${escapeHtml(t.target_node)}</span>
            <span class="mono">${t.progress}%</span>
          </div>
          <div class="task-progress"><div class="task-progress-fill" style="width:${t.progress}%"></div></div>
          <div class="text-xs text-muted" style="margin-top:4px">${escapeHtml(t.message || t.status)}</div>
        </div>
      </div>`).join('')}
    ${done.map(t => `
      <div class="task-bar">
        <span class="material-symbols-rounded" style="color:${t.status === 'success' ? 'var(--success)' : 'var(--danger)'}">${t.status === 'success' ? 'check_circle' : 'error'}</span>
        <div class="task-progress-wrap">
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span><b>${escapeHtml(t.kind.toUpperCase())} ${t.vmid}</b> · ${escapeHtml(t.source_node)} → ${escapeHtml(t.target_node)}</span>
            <span style="color:${t.status === 'success' ? 'var(--success)' : 'var(--danger)'}">${t.status}</span>
          </div>
          <div class="text-xs text-muted" style="margin-top:4px">${escapeHtml(t.message || '')}</div>
        </div>
        <button class="btn btn-sm btn-secondary" onclick="dismissTask('${t.id}')" title="Rimuovi">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>`).join('')}
  </div>`;
}

async function dismissTask(id) {
  try { await tasksApi.dismiss(id); } catch {}
}

async function reloadAll() {
  await refreshClusterData();
  DATA = CLUSTER_DATA;
  renderLayout();
}

init();
</script>
</body>
</html>
