<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Nodi — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css" />
<style>
/* Pills bar — tutti i nodi in cima */
.nodes-bar {
  display:flex; gap:8px; flex-wrap:wrap;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:14px 16px;
  margin-bottom:20px;
}
.nodes-bar-label {
  width:100%; font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.6px; color:var(--text-dim); margin-bottom:4px;
}
.node-pill {
  display:flex; align-items:center; gap:7px;
  padding:8px 16px; border-radius:20px; cursor:pointer;
  border:1px solid var(--border); font-size:13px; font-weight:500;
  background:var(--surface2); transition:all .15s; user-select:none;
}
.node-pill:hover  { border-color:var(--border2); background:var(--surface3); }
.node-pill.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.node-pill-meta   { font-size:10px; color:var(--text-dim); line-height:1.2; margin-top:1px; }

/* Node detail header */
.node-detail-header {
  display:flex; align-items:center; gap:12px;
  padding:14px 0 12px; margin-bottom:4px;
  border-bottom:1px solid var(--border);
}
.node-detail-header h2 { font-size:16px; font-weight:700; margin:0; flex:1; }

/* Node detail panel */
.node-panel { margin-top:16px; }
.metrics-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px; margin-bottom:24px;
}
.metric-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px;
  display:flex; flex-direction:column; gap:8px;
}
.metric-header { display:flex; align-items:center; justify-content:space-between; }
.metric-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); }
.metric-detail { font-size:11px; color:var(--text-muted); }
.ring-wrap { display:flex; align-items:center; justify-content:center; }

/* Refresh button spinner state */
.btn-refreshing .material-symbols-rounded { animation:spin 1.2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Fade during AJAX update */
.ajax-updating { opacity:.5; transition:opacity .15s; pointer-events:none; }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Nodi</h1>
        <p class="page-subtitle">Statistiche e macchine di tutti i server fisici</p>
      </div>
      <div class="page-actions" id="page-actions" style="display:flex;align-items:center;gap:8px"></div>
    </div>

    <div id="servers-content"></div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
const session = requireAuth();
let ALL_SRV = [];
let _activeKey = null;   // "cred_id:node_id"
let _bgRefreshTimer = null;
let _isRefreshing = false;

// URL params: ?cred=X&id=Y
const _params  = new URLSearchParams(location.search);
const _urlCred = _params.get('cred') ? parseInt(_params.get('cred')) : null;
const _urlNode = _params.get('id') || null;

async function init() {
  buildSidebar('nodes');
  if (_urlCred) setActiveCred(_urlCred);
  renderPageActions();

  // Carica istantaneo dalla cache se disponibile, poi aggiorna in background via AJAX
  if (ALL_CLUSTERS && ALL_CLUSTERS.length) {
    ALL_SRV = ALL_CLUSTERS;
    render();
    _bgRefresh();         // aggiorna dati freschi in background
  } else {
    await _fetchAndRender();
  }

  startRevisionPolling(() => { _bgRefresh(); });
  _startAutoRefreshTimer();
}

function renderPageActions() {
  document.getElementById('page-actions').innerHTML =
    `<button class="btn btn-secondary btn-sm" id="refresh-btn" onclick="manualRefresh()">
       <span class="material-symbols-rounded">refresh</span> Aggiorna
     </button>`;
}

// ── Fetch completo (prima visita, cache vuota) ──────────────────────────────
async function _fetchAndRender() {
  try {
    _allClustersTs = 0;
    CLUSTER_DATA = null;
    ALL_SRV = await ensureAllClusters();
  } catch { ALL_SRV = []; }
  render();
}

// ── Refresh silenzioso AJAX: chiama API, poi aggiorna solo i componenti ────
async function _bgRefresh() {
  if (_isRefreshing) return;
  _isRefreshing = true;
  try {
    const raw = await clusterApi.allTrees();
    if (!raw) { _isRefreshing = false; return; }

    // Aggiorna cache globale
    ALL_CLUSTERS = raw.map(it => ({
      cred_id:   it.cred_id,
      cred_name: it.cred_name,
      host:      it.host,
      port:      it.port,
      online:    !!it.online,
      raw:       it.tree || null,
      tree:      it.tree ? normalizeTree(it.tree) : { nodes: [], vms: [], clusters: [], backupServers: [] },
      error:     it.error || null,
    }));
    _allClustersTs = Date.now();
    ALL_SRV = ALL_CLUSTERS;

    // AJAX: aggiorna solo i pezzi del DOM già presenti
    _ajaxPatchDOM();
  } catch { /* silent */ }
  _isRefreshing = false;
}

// ── Helpers: lista piatta di tutti i nodi da tutti i server ────────────────
// Ogni nodo fisico (identificato dal suo hostname/nome) viene incluso UNA SOLA
// volta, anche se appare in più alberi (es. server in cluster con credenziali
// multiple). Viene preferita la credenziale il cui host corrisponde al nodo.
function _allNodes() {
  // Prima passata: raccogli tutti gli entry con metadati
  const candidates = [];
  ALL_SRV.forEach(srv => {
    (srv.tree?.nodes || []).forEach(n => {
      candidates.push({ ...n, srv });
    });
  });

  // Deduplicazione per nome nodo (case-insensitive).
  // Preferenza: entry con local=true (nodo direttamente connesso alla credenziale)
  // → ha statistiche reali e aggiornate indipendentemente dallo stato del cluster.
  // Se nessuna entry è local (es. cache vecchia), vince la prima occorrenza.
  const byName = new Map(); // name.lower → entry
  candidates.forEach(entry => {
    const key = entry.name.toLowerCase();
    if (!byName.has(key)) {
      byName.set(key, entry);
    } else {
      const existing = byName.get(key);
      // Sostituisci solo se il nuovo entry è "local" e quello esistente non lo è
      if (entry.local && !existing.local) {
        byName.set(key, entry);
      }
    }
  });

  return Array.from(byName.values());
}

// ── Render completo della pagina ────────────────────────────────────────────
function render() {
  const el = document.getElementById('servers-content');

  if (!ALL_SRV.length) {
    el.innerHTML = `<div class="card"><p class="text-muted">Nessun server Proxmox configurato.
      <a href="servers.html" style="color:var(--accent)">Aggiungine uno</a>.</p></div>`;
    return;
  }

  const allNodes = _allNodes();
  if (!allNodes.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="material-symbols-rounded">storage</span>
      <h3>Nessun nodo disponibile</h3>
      <p>I server configurati non hanno nodi raggiungibili.</p>
    </div>`;
    return;
  }

  // Imposta nodo attivo di default
  if (!_activeKey) {
    if (_urlCred && _urlNode) {
      _activeKey = `${_urlCred}:${_urlNode}`;
    } else {
      const first = allNodes.find(n => n.status === 'running') || allNodes[0];
      if (first) _activeKey = `${first.srv.cred_id}:${first.id}`;
    }
  }

  const multiServer = ALL_SRV.length > 1;

  // ── Pills bar: tutti i nodi in una riga ─────────────────────────────────
  const pillsHtml = allNodes.map(n => {
    const key = `${n.srv.cred_id}:${n.id}`;
    const isActive = key === _activeKey;
    const clusterName = (n.srv.tree?.clusters || []).find(c => (c.nodes || []).includes(n.id))?.name || null;
    const meta = clusterName ? `<div class="node-pill-meta">${escapeHtml(clusterName)}</div>` : '';
    return `<div class="node-pill${isActive ? ' active' : ''}"
                 id="pill-${n.srv.cred_id}-${escapeAttr(n.id)}"
                 onclick="selectNode(${n.srv.cred_id},'${escapeAttr(n.id)}')">
      <span class="status-dot ${n.status === 'running' ? 'running' : 'stopped'}"></span>
      <span class="material-symbols-rounded" style="font-size:16px">storage</span>
      <div>
        <div>${escapeHtml(n.name)}</div>
        ${meta}
      </div>
    </div>`;
  }).join('');

  // ── Pannello dettaglio nodo attivo ───────────────────────────────────────
  const activeEntry = allNodes.find(n => `${n.srv.cred_id}:${n.id}` === _activeKey);

  el.innerHTML = `
    <div class="nodes-bar" id="all-node-pills">
      <div class="nodes-bar-label">
        <span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;margin-right:4px">storage</span>
        Server fisici — seleziona un nodo
      </div>
      ${pillsHtml}
    </div>
    <div id="node-detail-panel">
      ${activeEntry ? _renderNodeDetailFull(activeEntry.srv, activeEntry) : ''}
    </div>`;
}

// ── Wrapper con header nodo sopra il dettaglio ──────────────────────────────
function _renderNodeDetailFull(srv, node) {
  const multiServer = ALL_SRV.length > 1;
  const srvMeta = multiServer
    ? `<span style="font-size:12px;color:var(--text-muted);font-family:var(--mono)">${escapeHtml(srv.cred_name)} · ${escapeHtml(srv.host)}</span>`
    : '';
  return `
    <div class="node-detail-header">
      <span class="material-symbols-rounded" style="font-size:22px;color:${node.status === 'running' ? 'var(--success)' : 'var(--text-dim)'}">storage</span>
      <h2>${escapeHtml(node.name)}</h2>
      ${srvMeta}
      <span class="chip ${node.status === 'running' ? 'chip-running' : 'chip-stopped'}" style="margin-left:auto">
        <span class="status-dot ${node.status === 'running' ? 'running' : 'stopped'}"></span>
        ${node.status}
      </span>
    </div>
    ${renderNodeDetail(srv, node)}`;
}

// ── AJAX patch: aggiorna i pezzi già nel DOM senza re-render completo ───────
function _ajaxPatchDOM() {
  const allNodes = _allNodes();

  // ① Aggiorna status dot di ogni pill
  allNodes.forEach(n => {
    const pill = document.getElementById(`pill-${n.srv.cred_id}-${n.id}`);
    if (!pill) return;
    const dot = pill.querySelector('.status-dot');
    if (dot) dot.className = `status-dot ${n.status === 'running' ? 'running' : 'stopped'}`;
  });

  // ② Aggiorna metriche e tabelle del nodo attivo
  if (!_activeKey) return;
  const active = allNodes.find(n => `${n.srv.cred_id}:${n.id}` === _activeKey);
  if (!active) return;

  const credId = active.srv.cred_id;
  const vms = (active.srv.tree?.vms || []).filter(v => v.node === active.id && v.type === 'vm');
  const cts = (active.srv.tree?.vms || []).filter(v => v.node === active.id && v.type === 'ct');

  const metricsEl = document.getElementById('active-metrics-grid');
  if (metricsEl) metricsEl.innerHTML = _renderMetricsGrid(active);

  const vmsTbody = document.getElementById('active-vms-tbody');
  if (vmsTbody) vmsTbody.innerHTML = vms.length
    ? vms.map(vm => renderVMRow(vm, credId)).join('')
    : '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessuna VM su questo nodo</td></tr>';

  const ctsTbody = document.getElementById('active-cts-tbody');
  if (ctsTbody) ctsTbody.innerHTML = cts.length
    ? cts.map(ct => renderVMRow(ct, credId)).join('')
    : '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessun container su questo nodo</td></tr>';

  const vmsCount = document.getElementById('active-vms-count');
  const ctsCount = document.getElementById('active-cts-count');
  if (vmsCount) vmsCount.textContent = vms.length;
  if (ctsCount) ctsCount.textContent = cts.length;
}

function selectNode(credId, nodeId) {
  _activeKey = `${credId}:${nodeId}`;
  setActiveCred(credId);
  history.replaceState(null, '', `?cred=${credId}&id=${encodeURIComponent(nodeId)}`);
  render();
}

function barColor(p) { return p > 80 ? 'var(--danger)' : p > 60 ? 'var(--warning)' : 'var(--success)'; }

function makeRing(pct, color) {
  const r = 28, cx = 34, cy = 34, circ = 2 * Math.PI * r;
  const dash = circ * (pct / 100), gap = circ - dash;
  return `<svg width="68" height="68" viewBox="0 0 68 68">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="700" fill="${color}"
      font-family="'JetBrains Mono',monospace">${pct}%</text>
  </svg>`;
}

// Solo la griglia metriche — usata sia dal render iniziale che dall'AJAX patch
function _renderMetricsGrid(node) {
  return `
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">CPU</span>
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--info)">memory</span>
      </div>
      <div class="ring-wrap">${makeRing(node.cpu, barColor(node.cpu))}</div>
      <div class="metric-detail">${node.maxcpu} core — ${node.cpu}% in uso</div>
    </div>
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">RAM</span>
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--accent)">storage</span>
      </div>
      <div class="ring-wrap">${makeRing(node.mem, barColor(node.mem))}</div>
      <div class="metric-detail">${Math.round(node.maxmem * node.mem / 100)} GB / ${node.maxmem} GB</div>
    </div>
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">Disco</span>
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--warning)">hard_drive</span>
      </div>
      <div class="ring-wrap">${makeRing(node.disk, barColor(node.disk))}</div>
      <div class="metric-detail">
        ${node.diskUsedGB !== undefined
          ? `${node.diskUsedGB} GB / ${node.diskTotalGB} GB usati`
          : `${node.disk}% utilizzo`}
      </div>
      ${node.disks && node.disks.length ? `
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
        ${node.disks.map(d => `
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px">
            <span style="color:var(--text-muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px" title="${escapeHtml(d.name)}">${escapeHtml(d.name)}</span>
            <span style="color:var(--text-dim)">${d.type}</span>
            <span style="color:${barColor(d.pct)};font-family:var(--mono);font-weight:600">${d.usedGB}/${d.sizeGB}GB</span>
          </div>
          <div style="height:2px;border-radius:2px;background:var(--surface3);margin-bottom:2px">
            <div style="height:100%;border-radius:2px;width:${d.pct}%;background:${barColor(d.pct)}"></div>
          </div>`).join('')}
      </div>` : ''}
    </div>
    <div class="metric-card" style="justify-content:space-between">
      <div class="metric-header"><span class="metric-label">Stato</span></div>
      <div>
        <span class="chip ${node.status === 'running' ? 'chip-running' : 'chip-stopped'}" style="font-size:14px;padding:6px 12px">
          <span class="status-dot ${node.status === 'running' ? 'running' : 'stopped'}"></span>
          ${node.status}
        </span>
      </div>
      <div class="metric-detail">VM: <b>${node.vms}</b> · CT: <b>${node.cts}</b> · Uptime: <b>${node.uptime}</b></div>
    </div>`;
}

function renderNodeDetail(srv, node) {
  const vms = (srv.tree?.vms || []).filter(v => v.node === node.id && v.type === 'vm');
  const cts = (srv.tree?.vms || []).filter(v => v.node === node.id && v.type === 'ct');
  const credId = srv.cred_id;

  return `
    <div class="metrics-grid" id="active-metrics-grid">
      ${_renderMetricsGrid(node)}
    </div>

    <div class="card">
      <div class="card-header">
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--info)">computer</span>
        <span class="card-title">Macchine Virtuali (<span id="active-vms-count">${vms.length}</span>)</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Nome</th><th>Stato</th><th>CPU</th><th>RAM</th><th>Disco</th><th></th></tr></thead>
          <tbody id="active-vms-tbody">
            ${vms.length ? vms.map(vm => renderVMRow(vm, credId)).join('') :
              '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessuna VM su questo nodo</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="card">
      <div class="card-header">
        <span class="material-symbols-rounded" style="font-size:18px;color:#5dd05d">deployed_code</span>
        <span class="card-title">Container LXC (<span id="active-cts-count">${cts.length}</span>)</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Nome</th><th>Stato</th><th>CPU</th><th>RAM</th><th>Disco</th><th></th></tr></thead>
          <tbody id="active-cts-tbody">
            ${cts.length ? cts.map(ct => renderVMRow(ct, credId)).join('') :
              '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessun container su questo nodo</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderVMRow(vm, credId) {
  return `<tr>
    <td class="mono">${vm.id}</td>
    <td><a href="vm-detail.html?cred=${credId}&id=${vm.id}" style="color:var(--text);font-weight:600">${escapeHtml(vm.name)}</a></td>
    <td><span class="chip ${vm.status === 'running' ? 'chip-running' : 'chip-stopped'}">${vm.status}</span></td>
    <td><span style="color:${barColor(vm.cpu)}">${vm.cpu}%</span></td>
    <td><span style="color:${barColor(vm.mem)}">${vm.mem}%</span></td>
    <td>${vm.disk} GB</td>
    <td>
      <div class="flex gap-8">
        ${can(session,'start') && vm.status !== 'running' ? `<button class="btn btn-sm btn-success" onclick="vmAction('start','${vm.kind}','${vm.node}',${vm.id},${credId})"><span class="material-symbols-rounded">play_arrow</span></button>` : ''}
        ${can(session,'stop')  && vm.status === 'running'  ? `<button class="btn btn-sm btn-danger"  onclick="vmAction('stop', '${vm.kind}','${vm.node}',${vm.id},${credId})"><span class="material-symbols-rounded">stop</span></button>` : ''}
        <a href="vm-detail.html?cred=${credId}&id=${vm.id}" class="btn btn-sm btn-secondary"><span class="material-symbols-rounded">open_in_new</span></a>
      </div>
    </td>
  </tr>`;
}

async function vmAction(action, kind, node, vmid, credId) {
  const labels = { start: 'avviata', stop: 'fermata', reboot: 'riavviata', shutdown: 'spenta' };
  const tid = showTaskToast(`${action} VM ${vmid}…`);
  try {
    await vmsApi[action](credId, kind, node, vmid);
    finishTaskToast(tid, true, `VM ${vmid} ${labels[action] || action}`);
    await _bgRefresh();
  } catch (e) {
    finishTaskToast(tid, false, 'Errore', e.message);
  }
}

// Bottone "Aggiorna": spinner sull'icona, poi AJAX patch
async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('btn-refreshing');
  await _bgRefresh();
  if (btn) btn.classList.remove('btn-refreshing');
}

// Auto-refresh silenzioso ogni 30s — niente countdown, niente UI intrusiva
function _startAutoRefreshTimer() {
  if (_bgRefreshTimer) clearInterval(_bgRefreshTimer);
  _bgRefreshTimer = setInterval(() => _bgRefresh(), 30000);
}

function escapeAttr(s) {
  return String(s ?? '').replace(/['"&<>]/g, c =>
    ({ "'": "\\'", '"': '&quot;', '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
}

init();
</script>
</body>
</html>
