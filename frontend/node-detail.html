<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Nodo — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css" />
<style>
.metrics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.metric-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px;
  display:flex; flex-direction:column; gap:8px;
}
.metric-header { display:flex; align-items:center; justify-content:space-between; }
.metric-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); }
.metric-detail { font-size:11px; color:var(--text-muted); }
.ring-wrap { display:flex; align-items:center; justify-content:center; }

.node-selector { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.node-pill {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:20px; cursor:pointer;
  border:1px solid var(--border); font-size:13px; font-weight:500;
  transition:all .15s;
}
.node-pill:hover { border-color:var(--border2); }
.node-pill.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="page-title">Dettaglio Nodo</h1>
        <p class="page-subtitle" id="page-sub">Statistiche e macchine del nodo</p>
      </div>
      <div class="page-actions" id="page-actions"></div>
    </div>

    <div class="node-selector" id="node-selector"></div>
    <div id="node-content"></div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
const session = requireAuth();
let activeNodeId = null;
let DATA = null;

async function init() {
  await buildSidebar('nodes');
  const credId = await ensureActiveCred();
  if (!credId) {
    document.getElementById('node-content').innerHTML = `<div class="card"><p class="text-muted">Nessun server Proxmox configurato. <a href="servers.html" style="color:var(--accent)">Aggiungine uno</a>.</p></div>`;
    return;
  }
  DATA = await ensureClusterData();
  const params = new URLSearchParams(location.search);
  activeNodeId = params.get('id') || DATA.nodes[0]?.id;
  if (!activeNodeId) {
    document.getElementById('node-content').innerHTML = `<div class="card"><p class="text-muted">Nessun nodo disponibile.</p></div>`;
    return;
  }
  renderNodeSelector();
  renderNode();
}

function renderNodeSelector() {
  document.getElementById('node-selector').innerHTML = DATA.nodes.map(n => `
    <div class="node-pill ${n.id === activeNodeId ? 'active' : ''}" onclick="selectNode('${n.id}')">
      <span class="status-dot ${n.status === 'running' ? 'running' : 'stopped'}"></span>
      <span class="material-symbols-rounded" style="font-size:16px">storage</span>
      ${escapeHtml(n.name)}
    </div>`).join('');
}

function selectNode(id) {
  activeNodeId = id;
  renderNodeSelector();
  renderNode();
  history.replaceState(null, '', '?id=' + id);
}

function barColor(p) { return p > 80 ? 'var(--danger)' : p > 60 ? 'var(--warning)' : 'var(--success)'; }

function makeRing(pct, color) {
  const r = 28, cx = 34, cy = 34, circ = 2 * Math.PI * r;
  const dash = circ * (pct / 100), gap = circ - dash;
  return `<svg width="68" height="68" viewBox="0 0 68 68">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="700" fill="${color}"
      font-family="'JetBrains Mono',monospace">${pct}%</text>
  </svg>`;
}

function renderNode() {
  const node = DATA.nodes.find(n => n.id === activeNodeId);
  if (!node) return;
  document.getElementById('page-title').textContent = `Nodo: ${node.name}`;
  document.getElementById('page-sub').textContent = `Uptime: ${node.uptime} · ${node.maxcpu} CPU · ${node.maxmem} GB RAM`;

  if (can(session, 'start')) {
    document.getElementById('page-actions').innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="location.reload()">
        <span class="material-symbols-rounded">refresh</span> Aggiorna
      </button>`;
  }

  const vms = DATA.vms.filter(v => v.node === node.id && v.type === 'vm');
  const cts = DATA.vms.filter(v => v.node === node.id && v.type === 'ct');

  document.getElementById('node-content').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">CPU</span>
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--info)">memory</span>
        </div>
        <div class="ring-wrap">${makeRing(node.cpu, barColor(node.cpu))}</div>
        <div class="metric-detail">${node.maxcpu} core — ${node.cpu}% in uso</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">RAM</span>
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--accent)">storage</span>
        </div>
        <div class="ring-wrap">${makeRing(node.mem, barColor(node.mem))}</div>
        <div class="metric-detail">${Math.round(node.maxmem * node.mem / 100)} GB / ${node.maxmem} GB</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Disco</span>
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--warning)">hard_drive</span>
        </div>
        <div class="ring-wrap">${makeRing(node.disk, barColor(node.disk))}</div>
        <div class="metric-detail">
          ${node.diskUsedGB !== undefined
            ? `${node.diskUsedGB} GB / ${node.diskTotalGB} GB usati`
            : `${node.disk}% utilizzo`}
        </div>
        ${node.disks && node.disks.length ? `
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
          ${node.disks.map(d => `
            <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px">
              <span style="color:var(--text-muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px" title="${escapeHtml(d.name)}">${escapeHtml(d.name)}</span>
              <span style="color:var(--text-dim)">${d.type}</span>
              <span style="color:${barColor(d.pct)};font-family:var(--mono);font-weight:600">${d.usedGB}/${d.sizeGB}GB</span>
            </div>
            <div style="height:2px;border-radius:2px;background:var(--surface3);margin-bottom:2px">
              <div style="height:100%;border-radius:2px;width:${d.pct}%;background:${barColor(d.pct)}"></div>
            </div>`).join('')}
        </div>` : ''}
      </div>
      <div class="metric-card" style="justify-content:space-between">
        <div class="metric-header"><span class="metric-label">Stato</span></div>
        <div>
          <span class="chip ${node.status === 'running' ? 'chip-running' : 'chip-stopped'}" style="font-size:14px;padding:6px 12px">
            <span class="status-dot ${node.status === 'running' ? 'running' : 'stopped'}"></span>
            ${node.status}
          </span>
        </div>
        <div class="metric-detail">VM: <b>${node.vms}</b> · CT: <b>${node.cts}</b></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--info)">computer</span>
        <span class="card-title">Macchine Virtuali (${vms.length})</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Nome</th><th>Stato</th><th>CPU</th><th>RAM</th><th>Disco</th><th></th>
          </tr></thead>
          <tbody>${vms.length ? vms.map(vm => renderVMRow(vm)).join('') : '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessuna VM su questo nodo</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="card">
      <div class="card-header">
        <span class="material-symbols-rounded" style="font-size:18px;color:#5dd05d">deployed_code</span>
        <span class="card-title">Container LXC (${cts.length})</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>Nome</th><th>Stato</th><th>CPU</th><th>RAM</th><th>Disco</th><th></th>
          </tr></thead>
          <tbody>${cts.length ? cts.map(ct => renderVMRow(ct)).join('') : '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessun container su questo nodo</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

function renderVMRow(vm) {
  return `<tr>
    <td class="mono">${vm.id}</td>
    <td><a href="vm-detail.html?id=${vm.id}" style="color:var(--text);font-weight:600">${escapeHtml(vm.name)}</a></td>
    <td><span class="chip ${vm.status === 'running' ? 'chip-running' : 'chip-stopped'}">${vm.status}</span></td>
    <td><span style="color:${barColor(vm.cpu)}">${vm.cpu}%</span></td>
    <td><span style="color:${barColor(vm.mem)}">${vm.mem}%</span></td>
    <td>${vm.disk} GB</td>
    <td>
      <div class="flex gap-8">
        ${can(session,'start') && vm.status !== 'running' ? `<button class="btn btn-sm btn-success" onclick="vmAction('start','${vm.kind}','${vm.node}',${vm.id})"><span class="material-symbols-rounded">play_arrow</span></button>` : ''}
        ${can(session,'stop')  && vm.status === 'running' ? `<button class="btn btn-sm btn-danger"  onclick="vmAction('stop','${vm.kind}','${vm.node}',${vm.id})"><span class="material-symbols-rounded">stop</span></button>` : ''}
        <a href="vm-detail.html?id=${vm.id}" class="btn btn-sm btn-secondary"><span class="material-symbols-rounded">open_in_new</span></a>
      </div>
    </td>
  </tr>`;
}

async function vmAction(action, kind, node, vmid) {
  const credId = getActiveCred();
  const labels = { start: 'avviata', stop: 'fermata', reboot: 'riavviata', shutdown: 'spenta' };
  try {
    await vmsApi[action](credId, kind, node, vmid);
    showToast(`VM ${vmid} ${labels[action] || action}`, action === 'stop' ? 'warning' : 'success');
    await refreshClusterData();
    DATA = CLUSTER_DATA;
    renderNode();
  } catch (e) {
    showToast('Errore: ' + e.message, 'danger');
  }
}

  // Fix 5: Enter sul selettore nodo non serve (è click), ma assicuriamoci
  // che nessun form nascosto intercetti Enter e ricarichi la pagina
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
      // Non fare nulla di default per evitare ricaricamenti indesiderati
      const activeModal = document.querySelector('.modal-overlay:not(.hidden)');
      if (!activeModal) e.preventDefault();
    }
  });

init();
</script>
</body>
</html>
