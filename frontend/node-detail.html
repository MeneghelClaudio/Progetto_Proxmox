<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Nodi — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css" />
<style>
/* Server accordion */
.server-section { margin-bottom: 24px; }
.server-header {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; border-radius:var(--radius-lg);
  background:var(--surface); border:1px solid var(--border);
  cursor:pointer; user-select:none;
  transition:border-color .15s;
}
.server-header:hover { border-color:var(--border2); }
.server-header h2 { font-size:14px; font-weight:700; flex:1; margin:0; }
.server-expand { font-size:14px; transition:transform .15s; color:var(--text-dim); }
.server-expand.collapsed { transform:rotate(-90deg); }

/* Node pills row */
.node-pills { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 0 0; }
.node-pill {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:20px; cursor:pointer;
  border:1px solid var(--border); font-size:13px; font-weight:500;
  background:var(--surface2); transition:all .15s;
}
.node-pill:hover  { border-color:var(--border2); }
.node-pill.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

/* Node detail panel */
.node-panel { margin-top:16px; }
.metrics-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px; margin-bottom:24px;
}
.metric-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px;
  display:flex; flex-direction:column; gap:8px;
}
.metric-header { display:flex; align-items:center; justify-content:space-between; }
.metric-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); }
.metric-detail { font-size:11px; color:var(--text-muted); }
.ring-wrap { display:flex; align-items:center; justify-content:center; }

/* Auto-refresh indicator */
.refresh-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text-dim);
  padding:4px 10px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
}
.refresh-spin { animation:spin 1.4s linear infinite; display:inline-flex; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Nodi</h1>
        <p class="page-subtitle">Statistiche e macchine di tutti i server fisici</p>
      </div>
      <div class="page-actions" id="page-actions" style="display:flex;align-items:center;gap:8px"></div>
    </div>

    <div id="servers-content"></div>
  </main>
</div>

<script src="api.js"></script>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
const session = requireAuth();
let ALL_SRV = [];
let _activeKey = null;   // "cred_id:node_id"
let _refreshTimer = null;
let _refreshSec = 30;
let _refreshCountdown = _refreshSec;
let _countdownTimer = null;

// --- URL params: ?cred=X&id=Y pre-selects a node ---
const _params  = new URLSearchParams(location.search);
const _urlCred = _params.get('cred') ? parseInt(_params.get('cred')) : null;
const _urlNode = _params.get('id') || null;

async function init() {
  buildSidebar('nodes');

  if (_urlCred) setActiveCred(_urlCred);

  renderPageActions();
  await loadData();
  startRevisionPolling(() => { loadData(true); });
  startAutoRefreshTimer();
}

function renderPageActions() {
  document.getElementById('page-actions').innerHTML = `
    <span class="refresh-badge" id="refresh-countdown">
      <span class="material-symbols-rounded refresh-spin" style="font-size:14px">sync</span>
      <span id="refresh-sec">${_refreshSec}s</span>
    </span>
    <button class="btn btn-secondary btn-sm" id="refresh-btn" onclick="loadData(true)">
      <span class="material-symbols-rounded">refresh</span> Aggiorna
    </button>`;
}

async function loadData(force = false) {
  if (force) {
    _allClustersTs = 0;
    CLUSTER_DATA = null;
  }
  try {
    ALL_SRV = await ensureAllClusters();
  } catch { ALL_SRV = []; }
  render();
  resetCountdown();
}

function render() {
  const el = document.getElementById('servers-content');
  if (!ALL_SRV.length) {
    el.innerHTML = `<div class="card"><p class="text-muted">Nessun server Proxmox configurato.
      <a href="servers.html" style="color:var(--accent)">Aggiungine uno</a>.</p></div>`;
    return;
  }

  // Pre-select first node if no active key yet
  if (!_activeKey) {
    if (_urlCred && _urlNode) {
      _activeKey = `${_urlCred}:${_urlNode}`;
    } else {
      const first = ALL_SRV.find(s => s.online && s.tree?.nodes?.length);
      if (first) _activeKey = `${first.cred_id}:${first.tree.nodes[0].id}`;
    }
  }

  el.innerHTML = ALL_SRV.map((srv, si) => renderServerSection(srv, si)).join('');

  // Expand the section that contains the active node
  ALL_SRV.forEach((srv, si) => {
    const activeInThisSrv = srv.tree?.nodes?.some(n => `${srv.cred_id}:${n.id}` === _activeKey);
    if (!activeInThisSrv) return;
    const panel = document.getElementById(`srv-nodes-${si}`);
    if (panel) panel.classList.remove('hidden');
    const arrow = document.getElementById(`srv-arrow-${si}`);
    if (arrow) arrow.classList.remove('collapsed');
  });
}

function renderServerSection(srv, si) {
  const nodes = srv.tree?.nodes || [];
  const dotColor = srv.online ? 'var(--success)' : 'var(--danger)';
  const statusLabel = srv.online ? `${nodes.length} nod${nodes.length !== 1 ? 'i' : 'o'}` : 'offline';
  const srvKey = `srv-${si}`;

  // Determine whether this section should start open
  const hasActiveNode = nodes.some(n => `${srv.cred_id}:${n.id}` === _activeKey);
  const startOpen = hasActiveNode || (si === 0 && !_activeKey);

  return `
    <div class="server-section">
      <div class="server-header" onclick="toggleServerSection(${si})">
        <span class="material-symbols-rounded" style="color:${dotColor};font-size:20px">dns</span>
        <h2>${escapeHtml(srv.cred_name)}</h2>
        <span class="text-xs text-muted mono">${escapeHtml(srv.host)}:${srv.port}</span>
        <span class="chip ${srv.online ? 'chip-running' : 'chip-stopped'}">${statusLabel}</span>
        <span class="material-symbols-rounded server-expand${startOpen ? '' : ' collapsed'}" id="srv-arrow-${si}">expand_more</span>
      </div>

      <div id="srv-nodes-${si}" class="${startOpen ? '' : 'hidden'}">
        ${!srv.online ? `<div style="padding:12px 4px;color:var(--text-dim);font-size:12px">
          <span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle;color:var(--danger)">cloud_off</span>
          Server non raggiungibile${srv.error ? ': ' + escapeHtml(srv.error) : ''}</div>` :
        nodes.length === 0 ? `<div style="padding:12px 4px;color:var(--text-dim);font-size:12px">Nessun nodo disponibile.</div>` :
        `<div class="node-pills">
          ${nodes.map(n => {
            const key = `${srv.cred_id}:${n.id}`;
            return `<div class="node-pill${key === _activeKey ? ' active' : ''}" onclick="selectNode(${srv.cred_id},'${escapeAttr(n.id)}')">
              <span class="status-dot ${n.status === 'running' ? 'running' : 'stopped'}"></span>
              <span class="material-symbols-rounded" style="font-size:16px">storage</span>
              ${escapeHtml(n.name)}
            </div>`;
          }).join('')}
        </div>
        ${renderActiveNodePanel(srv, nodes)}`}
      </div>
    </div>`;
}

function renderActiveNodePanel(srv, nodes) {
  const activeNode = nodes.find(n => `${srv.cred_id}:${n.id}` === _activeKey);
  if (!activeNode) return '';
  return `<div class="node-panel">${renderNodeDetail(srv, activeNode)}</div>`;
}

function toggleServerSection(si) {
  const panel = document.getElementById(`srv-nodes-${si}`);
  const arrow = document.getElementById(`srv-arrow-${si}`);
  if (!panel) return;
  panel.classList.toggle('hidden');
  if (arrow) arrow.classList.toggle('collapsed', panel.classList.contains('hidden'));
}

function selectNode(credId, nodeId) {
  _activeKey = `${credId}:${nodeId}`;
  setActiveCred(credId);
  history.replaceState(null, '', `?cred=${credId}&id=${encodeURIComponent(nodeId)}`);
  render();
}

function barColor(p) { return p > 80 ? 'var(--danger)' : p > 60 ? 'var(--warning)' : 'var(--success)'; }

function makeRing(pct, color) {
  const r = 28, cx = 34, cy = 34, circ = 2 * Math.PI * r;
  const dash = circ * (pct / 100), gap = circ - dash;
  return `<svg width="68" height="68" viewBox="0 0 68 68">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="700" fill="${color}"
      font-family="'JetBrains Mono',monospace">${pct}%</text>
  </svg>`;
}

function renderNodeDetail(srv, node) {
  const vms = (srv.tree?.vms || []).filter(v => v.node === node.id && v.type === 'vm');
  const cts = (srv.tree?.vms || []).filter(v => v.node === node.id && v.type === 'ct');
  const credId = srv.cred_id;

  return `
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">CPU</span>
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--info)">memory</span>
        </div>
        <div class="ring-wrap">${makeRing(node.cpu, barColor(node.cpu))}</div>
        <div class="metric-detail">${node.maxcpu} core — ${node.cpu}% in uso</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">RAM</span>
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--accent)">storage</span>
        </div>
        <div class="ring-wrap">${makeRing(node.mem, barColor(node.mem))}</div>
        <div class="metric-detail">${Math.round(node.maxmem * node.mem / 100)} GB / ${node.maxmem} GB</div>
      </div>
      <div class="metric-card">
        <div class="metric-header">
          <span class="metric-label">Disco</span>
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--warning)">hard_drive</span>
        </div>
        <div class="ring-wrap">${makeRing(node.disk, barColor(node.disk))}</div>
        <div class="metric-detail">
          ${node.diskUsedGB !== undefined
            ? `${node.diskUsedGB} GB / ${node.diskTotalGB} GB usati`
            : `${node.disk}% utilizzo`}
        </div>
        ${node.disks && node.disks.length ? `
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
          ${node.disks.map(d => `
            <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px">
              <span style="color:var(--text-muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px" title="${escapeHtml(d.name)}">${escapeHtml(d.name)}</span>
              <span style="color:var(--text-dim)">${d.type}</span>
              <span style="color:${barColor(d.pct)};font-family:var(--mono);font-weight:600">${d.usedGB}/${d.sizeGB}GB</span>
            </div>
            <div style="height:2px;border-radius:2px;background:var(--surface3);margin-bottom:2px">
              <div style="height:100%;border-radius:2px;width:${d.pct}%;background:${barColor(d.pct)}"></div>
            </div>`).join('')}
        </div>` : ''}
      </div>
      <div class="metric-card" style="justify-content:space-between">
        <div class="metric-header"><span class="metric-label">Stato</span></div>
        <div>
          <span class="chip ${node.status === 'running' ? 'chip-running' : 'chip-stopped'}" style="font-size:14px;padding:6px 12px">
            <span class="status-dot ${node.status === 'running' ? 'running' : 'stopped'}"></span>
            ${node.status}
          </span>
        </div>
        <div class="metric-detail">VM: <b>${node.vms}</b> · CT: <b>${node.cts}</b> · Uptime: <b>${node.uptime}</b></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="material-symbols-rounded" style="font-size:18px;color:var(--info)">computer</span>
        <span class="card-title">Macchine Virtuali (${vms.length})</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Nome</th><th>Stato</th><th>CPU</th><th>RAM</th><th>Disco</th><th></th></tr></thead>
          <tbody>${vms.length ? vms.map(vm => renderVMRow(vm, credId)).join('') :
            '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessuna VM su questo nodo</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="card">
      <div class="card-header">
        <span class="material-symbols-rounded" style="font-size:18px;color:#5dd05d">deployed_code</span>
        <span class="card-title">Container LXC (${cts.length})</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Nome</th><th>Stato</th><th>CPU</th><th>RAM</th><th>Disco</th><th></th></tr></thead>
          <tbody>${cts.length ? cts.map(ct => renderVMRow(ct, credId)).join('') :
            '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">Nessun container su questo nodo</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

function renderVMRow(vm, credId) {
  return `<tr>
    <td class="mono">${vm.id}</td>
    <td><a href="vm-detail.html?cred=${credId}&id=${vm.id}" style="color:var(--text);font-weight:600">${escapeHtml(vm.name)}</a></td>
    <td><span class="chip ${vm.status === 'running' ? 'chip-running' : 'chip-stopped'}">${vm.status}</span></td>
    <td><span style="color:${barColor(vm.cpu)}">${vm.cpu}%</span></td>
    <td><span style="color:${barColor(vm.mem)}">${vm.mem}%</span></td>
    <td>${vm.disk} GB</td>
    <td>
      <div class="flex gap-8">
        ${can(session,'start') && vm.status !== 'running' ? `<button class="btn btn-sm btn-success" onclick="vmAction('start','${vm.kind}','${vm.node}',${vm.id},${credId})"><span class="material-symbols-rounded">play_arrow</span></button>` : ''}
        ${can(session,'stop')  && vm.status === 'running'  ? `<button class="btn btn-sm btn-danger"  onclick="vmAction('stop', '${vm.kind}','${vm.node}',${vm.id},${credId})"><span class="material-symbols-rounded">stop</span></button>` : ''}
        <a href="vm-detail.html?cred=${credId}&id=${vm.id}" class="btn btn-sm btn-secondary"><span class="material-symbols-rounded">open_in_new</span></a>
      </div>
    </td>
  </tr>`;
}

async function vmAction(action, kind, node, vmid, credId) {
  const labels = { start: 'avviata', stop: 'fermata', reboot: 'riavviata', shutdown: 'spenta' };
  const tid = showTaskToast(`${action} VM ${vmid}…`);
  try {
    await vmsApi[action](credId, kind, node, vmid);
    finishTaskToast(tid, true, `VM ${vmid} ${labels[action] || action}`);
    await loadData(true);
  } catch (e) {
    finishTaskToast(tid, false, 'Errore', e.message);
  }
}

// --- Auto-refresh countdown ---

function startAutoRefreshTimer() {
  if (_refreshTimer) clearInterval(_refreshTimer);
  if (_countdownTimer) clearInterval(_countdownTimer);

  _refreshCountdown = _refreshSec;
  _refreshTimer = setInterval(() => loadData(true), _refreshSec * 1000);
  _countdownTimer = setInterval(() => {
    _refreshCountdown--;
    const el = document.getElementById('refresh-sec');
    if (el) el.textContent = `${_refreshCountdown}s`;
    if (_refreshCountdown <= 0) _refreshCountdown = _refreshSec;
  }, 1000);
}

function resetCountdown() {
  _refreshCountdown = _refreshSec;
}

function escapeAttr(s) {
  return String(s ?? '').replace(/['"&<>]/g, c => ({'\'': '\\\'', '"': '&quot;', '&': '&amp;', '<': '&lt;', '>': '&gt;'})[c]);
}

init();
</script>
</body>
</html>
