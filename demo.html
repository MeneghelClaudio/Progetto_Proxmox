<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProxPanel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0b0d12;--bg1:#11141b;--bg2:#181c26;--bg3:#1f2435;--bg4:#272d3f;
  --border:#242837;--border2:#323a52;
  --t0:#dde1ed;--t1:#8a93ac;--t2:#4a5168;
  --acc:#4f8ef7;--acc2:#3d6fd4;--acc-dim:rgba(79,142,247,.12);
  --grn:#3ecf8e;--grn-bg:rgba(62,207,142,.1);
  --red:#f26b6b;--red-bg:rgba(242,107,107,.1);
  --amb:#f5a623;--amb-bg:rgba(245,166,35,.1);
  --tel:#38c4c4;--pur:#8b7fe8;
  --sw:252px;--th:46px;--sh:42px;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg0);color:var(--t0);height:100vh;display:flex;flex-direction:column;font-size:13px;overflow:hidden;}

.topbar{height:var(--th);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0;z-index:200;}
.logo{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--acc);display:flex;align-items:center;gap:8px;}
.logo-box{width:24px;height:24px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:14px;height:14px;fill:white;}
.vsep{width:1px;height:22px;background:var(--border2);flex-shrink:0;}
.tnav{display:flex;gap:2px;}
.tnav button{background:none;border:none;color:var(--t1);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;}
.tnav button:hover{background:var(--bg3);color:var(--t0);}
.tnav button.act{background:var(--bg3);color:var(--acc);}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px;}
.cpill{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--grn);padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.pdot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.ava{width:28px;height:28px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--t1);}

.layout{display:flex;flex:1;overflow:hidden;}

.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-top{padding:10px 12px 8px;border-bottom:1px solid var(--border);}
.sb-search{background:var(--bg2);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;gap:6px;padding:5px 8px;}
.sb-search input{background:none;border:none;outline:none;font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--t0);width:100%;}
.sb-search input::placeholder{color:var(--t2);}
.sb-scroll{overflow-y:auto;flex:1;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.tn{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;border-left:2px solid transparent;transition:background .1s,border-color .1s;user-select:none;}
.tn:hover{background:var(--bg2);}
.tn.sel{background:var(--bg3);border-left-color:var(--acc);}
.tn.l1{padding-left:10px;}
.tn.l2{padding-left:24px;}
.tn.l3{padding-left:38px;}
.tarr{font-size:8px;color:var(--t2);width:10px;flex-shrink:0;transition:transform .18s;}
.tarr.op{transform:rotate(90deg);}
.tico{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tlbl{flex:1;font-size:12px;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tlbl.mo{font-family:'JetBrains Mono',monospace;font-size:11px;}
.tbadge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:8px;flex-shrink:0;}
.tg{background:var(--grn-bg);color:var(--grn);}
.tr2{background:var(--red-bg);color:var(--red);}
.ta{background:var(--amb-bg);color:var(--amb);}
.tb{background:var(--acc-dim);color:var(--acc);}
.tgr{background:var(--bg3);color:var(--t1);}

.rpane{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.subtop{height:var(--sh);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 20px;gap:4px;flex-shrink:0;}
.stab{display:flex;align-items:center;gap:7px;padding:0 16px;font-size:12px;color:var(--t1);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none;}
.stab:hover{color:var(--t0);}
.stab.act{color:var(--acc);border-bottom-color:var(--acc);}
.stab svg{width:13px;height:13px;opacity:.7;}
.stab.act svg{opacity:1;}

.bcbar{height:32px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;}
.bci{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t1);cursor:pointer;padding:0 4px;border-radius:4px;transition:color .12s;}
.bci:hover{color:var(--acc);}
.bci.cur{color:var(--t0);}
.bcsep{color:var(--t2);margin:0 2px;font-size:11px;}

.cscroll{flex:1;overflow-y:auto;padding:20px 22px;}
.cscroll::-webkit-scrollbar{width:5px;}
.cscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px;}

/* card shared */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .12s;}
.card:hover{border-color:var(--border2);transform:translateY(-2px);}
.card.sel{border-color:var(--acc);}
.ch{padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.cico{width:34px;height:34px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ctitle{font-size:14px;font-weight:500;}
.csub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);margin-top:2px;}
.sdot{width:8px;height:8px;border-radius:50%;margin-left:auto;flex-shrink:0;}
.sdot.on{background:var(--grn);box-shadow:0 0 5px var(--grn);animation:pulse 2s infinite;}
.sdot.off{background:var(--red);}
.sdot.wn{background:var(--amb);box-shadow:0 0 5px var(--amb);animation:pulse 2s infinite;}
.cb{padding:12px 14px;}
.cstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.cst{background:var(--bg2);border-radius:6px;padding:8px 10px;}
.cstl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.cstv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;}
.mets{display:flex;flex-direction:column;gap:6px;}
.mr{display:flex;align-items:center;gap:8px;}
.mn{font-size:10px;color:var(--t2);width:30px;flex-shrink:0;}
.mb{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;}
.mv{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t1);width:30px;text-align:right;}
.cf{padding:8px 14px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border);}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--t1);display:flex;align-items:center;gap:3px;}
.cdot{width:5px;height:5px;border-radius:50%;}

/* vm card specifics */
.vtbadge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.vvm{background:rgba(79,142,247,.15);color:var(--acc);}
.vct{background:rgba(56,196,196,.15);color:var(--tel);}
.spill{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;}
.srun{background:var(--grn-bg);color:var(--grn);}
.sstop{background:var(--red-bg);color:var(--red);}
.spause{background:var(--amb-bg);color:var(--amb);}
.vmr{display:flex;align-items:center;gap:8px;}
.vml{font-size:10px;color:var(--t2);width:32px;flex-shrink:0;}
.vmb{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.vmf{height:100%;border-radius:2px;}
.vmv{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t1);width:52px;text-align:right;}

/* detail page */
.dp{position:absolute;inset:0;background:var(--bg0);z-index:50;display:none;flex-direction:column;overflow:hidden;}
.dp.vis{display:flex;}
.dptop{height:var(--th);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.bbtn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
.bbtn:hover{background:var(--bg4);color:var(--t0);}
.dpscroll{flex:1;overflow-y:auto;padding:24px 28px;}
.dpscroll::-webkit-scrollbar{width:5px;}
.dpscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.dcard{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.dct{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--t2);margin-bottom:10px;}
.dr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
.dr:last-child{margin-bottom:0;}
.dk{font-size:12px;color:var(--t1);}
.dv{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t0);}
.dv.g{color:var(--grn);}
.dv.r{color:var(--red);}
.dv.a{color:var(--amb);}
.dv.b{color:var(--acc);}
.bm{margin:8px 0;}
.bml{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:5px;}
.bmt{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bmf{height:100%;border-radius:4px;}
.cw{position:relative;height:130px;width:100%;}
.sectit{font-size:10px;text-transform:uppercase;letter-spacing:.9px;font-weight:600;color:var(--t2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sectit::after{content:'';flex:1;height:1px;background:var(--border);}
.dbtn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--t0);font-family:'IBM Plex Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
.dbtn:hover{background:var(--bg4);}
.dbtn svg{width:13px;height:13px;}
.dbtn.dstop{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.dbtn.dgo{border-color:var(--grn);color:var(--grn);background:var(--grn-bg);}

.toast-area{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:1000;}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--t0);animation:tin .2s ease;min-width:220px;}
.toast.ok{border-color:var(--grn);}
.toast.err{border-color:var(--red);}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.toast.ok .tdot{background:var(--grn);}
.toast.err .tdot{background:var(--red);}
@keyframes tin{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-box"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg></div>

  </div>
  <div class="vsep"></div>
  <div class="tnav">

</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-search">

        <input type="text" placeholder="Cerca..." id="sbSearch" oninput="filterSidebar(this.value)">
      </div>
    </div>
    <div class="sb-scroll" id="sbScroll"></div>
  </div>

  <div class="rpane" id="rpane">
    <div class="subtop">
      <div class="stab act" id="tab-cluster" onclick="switchTab('cluster')">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>
        Server
      </div>
      <div class="stab" id="tab-vm" onclick="switchTab('vm')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8M12 18v3M8 9l3 3-3 3M13 15h3"/></svg>
        VM / CT
      </div>
    </div>
    <div class="bcbar" id="bcbar"></div>
    <div class="cscroll"><div class="cgrid" id="cgrid"></div></div>
  </div>
</div>

<div class="dp" id="dpanel">
  <div class="dptop">
    <button class="bbtn" onclick="closeDetail()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Indietro
    </button>
    <div class="vsep"></div>
    <div id="dpbc" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);"></div>
    <div style="margin-left:auto;display:flex;gap:8px;" id="dpact"></div>
  </div>
  <div class="dpscroll" id="dpbody"></div>
</div>

<div class="toast-area" id="toasts"></div>

// ── STATE ─────────────────────────────────────────
var S = {tab:'cluster',cl:null,srv:null,vm:null,clOpen:{},srvOpen:{}};

// ── HELPERS ───────────────────────────────────────
function bc(pct){return pct>85?'var(--red)':pct>65?'var(--amb)':'var(--acc)';}
function mbar(pct,col){return '<div class="mb"><div class="mf" style="width:'+pct+'%;background:'+(col||bc(pct))+'"></div></div>';}
function pill(st){var c=st==='running'?'srun':st==='paused'?'spause':'sstop';return '<div class="spill '+c+'"><div style="width:5px;height:5px;border-radius:50%;background:currentColor;"></div>'+st+'</div>';}
function sdot(st){return '<div class="sdot '+(st==='online'?'on':st==='warning'?'wn':'off')+'"></div>';}
function chips(vmids){
  return vmids.map(function(id){
    var v=VMS.find(function(x){return x.id===id;});
    if(!v)return '';
    var dc=v.st==='running'?'var(--grn)':v.st==='paused'?'var(--amb)':'var(--red)';
    return '<div class="chip"><div class="cdot" style="background:'+dc+'"></div>'+v.vmid+'</div>';
  }).join('');
}

// ── SIDEBAR ───────────────────────────────────────
function renderSidebar(){
  var h='';
  CL.forEach(function(cl){
    var open=S.clOpen[cl.id]!==false;
    var selCl=S.cl===cl.id&&!S.srv;
    var clColor=cl.status==='online'?'var(--grn)':'var(--amb)';
    h+='<div class="tn l1'+(selCl?' sel':'')+'" onclick="sbCl(\''+cl.id+'\')">'+
       '<div class="tarr'+(open?' op':'')+'">&#9658;</div>'+
       '<div class="tico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+clColor+'" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><path d="M12 8v4"/></svg></div>'+
       '<span class="tlbl">'+cl.name+'</span>'+
       '<span class="tbadge tg">'+cl.nodes+'</span></div>';
    if(open){
      var srvs=SRV.filter(function(s){return s.cid===cl.id;});
      srvs.forEach(function(srv){
        var sopen=S.srvOpen[srv.id]!==false;
        var selSrv=S.srv===srv.id&&!S.vm;
        var sc=srv.status==='online'?'var(--grn)':'var(--amb)';
        h+='<div class="tn l2'+(selSrv?' sel':'')+'" onclick="sbSrv(\''+cl.id+'\',\''+srv.id+'\')">'+
           '<div class="tarr'+(sopen?' op':'')+'">&#9658;</div>'+
           '<div class="tico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="'+sc+'" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg></div>'+
           '<span class="tlbl mo">'+srv.name+'</span>'+
           '<span class="tbadge tb">'+srv.vmids.length+'</span></div>';
        if(sopen){
          var vms=VMS.filter(function(v){return v.sid===srv.id;});
          vms.forEach(function(vm){
            var vc=vm.st==='running'?'var(--grn)':vm.st==='paused'?'var(--amb)':'var(--red)';
            var selVm=S.vm===vm.id;
            var vmPath=vm.type==='VM'?'<rect x="3" y="4" width="18" height="14" rx="2"/>':'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18M3 15h18"/>';
            h+='<div class="tn l3'+(selVm?' sel':'')+'" onclick="sbVm(\''+cl.id+'\',\''+srv.id+'\',\''+vm.id+'\')">'+
               '<div class="tico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="'+vc+'" stroke-width="2">'+vmPath+'</svg></div>'+
               '<span class="tlbl mo">'+vm.vmid+' '+vm.name+'</span>'+
               '<span class="tbadge" style="background:'+(vm.st==='running'?'var(--grn-bg)':vm.st==='paused'?'var(--amb-bg)':'var(--red-bg)')+';color:'+vc+'">'+vm.st.slice(0,3)+'</span></div>';
          });
        }
      });
    }
  });
  document.getElementById('sbScroll').innerHTML=h;
}

function sbCl(cid){S.clOpen[cid]=S.clOpen[cid]===false?true:false;S.cl=cid;S.srv=null;S.vm=null;S.tab='cluster';renderAll();}
function sbSrv(cid,sid){S.srvOpen[sid]=S.srvOpen[sid]===false?true:false;S.cl=cid;S.srv=sid;S.vm=null;S.tab='server';renderAll();}
function sbVm(cid,sid,vid){S.cl=cid;S.srv=sid;S.vm=vid;S.tab='vm';renderAll();}

// ── TABS ──────────────────────────────────────────
function switchTab(t){S.tab=t;renderAll();}
function updateTabs(){
  ['cluster','server','vm'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    if(el)el.className='stab'+(S.tab===t?' act':'');
  });
}

// ── BREADCRUMB ────────────────────────────────────
function renderBreadcrumb(){
  var bar=document.getElementById('bcbar');
  var h='<span class="bci" onclick="bcGo(0)">datacenter</span>';
  if(S.cl){
    var cl=CL.find(function(c){return c.id===S.cl;});
    h+='<span class="bcsep"> / </span><span class="bci" onclick="bcGo(1)">'+cl.name+'</span>';
  }
  if(S.srv){
    var srv=SRV.find(function(s){return s.id===S.srv;});
    h+='<span class="bcsep"> / </span><span class="bci" onclick="bcGo(2)">'+srv.name+'</span>';
  }
  if(S.vm){
    var vm=VMS.find(function(v){return v.id===S.vm;});
    h+='<span class="bcsep"> / </span><span class="bci cur">'+vm.type.toLowerCase()+'-'+vm.vmid+' ('+vm.name+')</span>';
  }
  var tl=S.tab==='cluster'?'cluster view':S.tab==='server'?'server view':'vm/ct view';
  h+='<span class="bcsep" style="margin-left:8px"> &mdash; </span><span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--acc)">'+tl+'</span>';
  bar.innerHTML=h;
}
function bcGo(lvl){
  if(lvl===0){S.cl=null;S.srv=null;S.vm=null;S.tab='cluster';}
  else if(lvl===1){S.srv=null;S.vm=null;S.tab='server';}
  else if(lvl===2){S.vm=null;S.tab='vm';}
  renderAll();
}

// ── CARDS ─────────────────────────────────────────
function renderCards(){
  var g=document.getElementById('cgrid');
  if(S.tab==='cluster')renderClusterCards(g);
  else if(S.tab==='server')renderServerCards(g);
  else renderVmCards(g);
}

function renderClusterCards(g){
  var list=S.cl?CL.filter(function(c){return c.id===S.cl;}):CL;
  g.innerHTML=list.map(function(cl){
    var srvs=SRV.filter(function(s){return s.cid===cl.id;});
    var ch=srvs.map(function(s){return '<div class="chip"><div class="cdot" style="background:var(--grn)"></div>'+s.name+'</div>';}).join('');
    var sc=cl.status==='warning'?'var(--amb)':'var(--acc)';
    return '<div class="card" onclick="clickCl(\''+cl.id+'\')">'+
      '<div class="ch"><div class="cico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+sc+'" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><path d="M12 8v4"/></svg></div>'+
      '<div><div class="ctitle">'+cl.name+'</div><div class="csub">'+cl.loc+' &middot; '+cl.ip+'</div></div>'+sdot(cl.status)+'</div>'+
      '<div class="cb"><div class="cstats">'+
        '<div class="cst"><div class="cstl">Server</div><div class="cstv" style="color:var(--acc)">'+cl.nodes+'</div></div>'+
        '<div class="cst"><div class="cstl">VM / CT</div><div class="cstv" style="color:var(--tel)">'+cl.vmcount+'</div></div>'+
      '</div><div class="mets">'+
        '<div class="mr"><span class="mn">CPU</span>'+mbar(cl.cpu)+'<span class="mv" style="color:'+bc(cl.cpu)+'">'+cl.cpu+'%</span></div>'+
        '<div class="mr"><span class="mn">RAM</span>'+mbar(cl.ram,'var(--pur)')+'<span class="mv">'+cl.ram+'%</span></div>'+
        '<div class="mr"><span class="mn">Disk</span>'+mbar(cl.disk,'var(--tel)')+'<span class="mv">'+cl.disk+'%</span></div>'+
      '</div></div><div class="cf">'+ch+'</div></div>';
  }).join('');
}

function renderServerCards(g){
  var list;
  if(S.srv)list=SRV.filter(function(s){return s.id===S.srv;});

function renderVmCards(g){

function clickCl(cid){S.cl=cid;S.srv=null;S.vm=null;S.tab='server';renderAll();}

// ── DETAIL ────────────────────────────────────────
function openDetail(vid){
  var vm=VMS.find(function(v){return v.id===vid;});
  if(!vm)return;
  var srv=SRV.find(function(s){return s.id===vm.sid;});
  var cl=CL.find(function(c){return c.id===srv.cid;});
  S.vm=vid;
  renderSidebar();

  document.getElementById('dpbc').textContent=cl.name+' / '+srv.name+' / '+vm.type.toLowerCase()+'-'+vm.vmid+' ('+vm.name+')';

  var isRun=vm.st==='running';
  var stopStartBtn='<button class="dbtn '+(isRun?'dstop':'dgo')+'" onclick="toggleVm(\''+vid+'\')">'+(isRun?'<svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><rect x="6" y="6" width="12" height="12" rx="1"/></svg> Stop':'<svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><polygon points="5 3 19 12 5 21 5 3"/></svg> Start')+'</button>';

function closeDetail(){document.getElementById('dpanel').className='dp';}

function toggleVm(vid){
  var vm=VMS.find(function(v){return v.id===vid;});
  if(!vm)return;
  vm.st=vm.st==='running'?'stopped':'running';
  showToast(vm.name+' -> '+vm.st,'ok');
  openDetail(vid);
  renderCards();
  renderSidebar();
}

// ── CHARTS ────────────────────────────────────────
function genSeries(base,noise,len){
  len=len||30;var out=[];var v=base;
  for(var i=0;i<len;i++){v=Math.min(99,Math.max(1,v+(Math.random()-.48)*noise));out.push(Math.round(v));}
  return out;
}

function drawCharts(vm){
  drawLine('c-cpu',[{d:genSeries(vm.cpu,12),c:'#4f8ef7'}],0,100);
  drawLine('c-ram',[{d:genSeries(vm.ram,6),c:'#8b7fe8'}],0,100);
  drawLine('c-disk',[{d:genSeries(15,20),c:'#38c4c4'},{d:genSeries(8,15),c:'#f5a623'}],0,null);
  drawLine('c-net',[{d:genSeries(parseFloat(vm.nin)||5,15),c:'#3ecf8e'},{d:genSeries(parseFloat(vm.nout)||10,20),c:'#4f8ef7'}],0,null);
}

function drawLine(id,series,ymin,ymax){
  var canvas=document.getElementById(id);
  if(!canvas)return;
  var W=canvas.offsetWidth||300,H=canvas.offsetHeight||130;
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  var all=[];series.forEach(function(s){s.d.forEach(function(v){all.push(v);});});
  var mn=ymin!=null?ymin:Math.min.apply(null,all)*0.9;
  var mx=ymax!=null?ymax:Math.max.apply(null,all)*1.1||10;
  var pad={t:8,b:20,l:32,r:8};
  var aw=W-pad.l-pad.r,ah=H-pad.t-pad.b;
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.t+ah*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+aw,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='9px monospace';
    ctx.fillText(Math.round(mn+(mx-mn)*i/4),2,y+3);
  }
  var n=series[0].d.length;
  series.forEach(function(s){
    var pts=s.d.map(function(v,i){return {x:pad.l+aw*i/(n-1),y:pad.t+ah*(1-(v-mn)/(mx-mn||1))};});
    var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ah);
    grad.addColorStop(0,s.c+'40');grad.addColorStop(1,s.c+'00');
    ctx.fillStyle=grad;ctx.beginPath();
    ctx.moveTo(pts[0].x,pad.t+ah);
    pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
    ctx.lineTo(pts[pts.length-1].x,pad.t+ah);ctx.closePath();ctx.fill();
    ctx.strokeStyle=s.c;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.beginPath();
    pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
    ctx.stroke();
  });
}

// ── MISC ──────────────────────────────────────────
function filterSidebar(q){
  document.querySelectorAll('#sbScroll .tn').forEach(function(el){
    var lbl=el.querySelector('.tlbl');
    el.style.display=(!q||!lbl||lbl.textContent.toLowerCase().indexOf(q.toLowerCase())>=0)?'':'none';
  });
}

function showToast(msg,type){
  type=type||'ok';
  var a=document.getElementById('toasts');
  var t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML='<div class="tdot"></div><span>'+msg+'</span>';
  a.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3000);
}

function renderAll(){updateTabs();renderSidebar();renderCards();renderBreadcrumb();}

// ── INIT ──────────────────────────────────────────
renderAll();

// Live animation on vm cards
setInterval(function(){
  document.querySelectorAll('.vmf').forEach(function(bar){
    var curr=parseFloat(bar.style.width)||0;
    if(curr===0)return;
    var next=Math.min(99,Math.max(1,curr+(Math.random()-.5)*4));
    bar.style.width=next+'%';
  });
},2500);
</script>
