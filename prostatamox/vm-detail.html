<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VM Detail — ProxMox Manager</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.detail-layout { display:grid; grid-template-columns:260px 1fr; gap:16px; }
.vm-list-panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
  display:flex; flex-direction:column;
}
.vm-list-header {
  padding:14px 16px; border-bottom:1px solid var(--border);
  font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:.6px; color:var(--text-muted);
  display:flex; align-items:center; gap:8px;
}
.vm-list-search {
  padding:10px 12px; border-bottom:1px solid var(--border);
}
.vm-list-search input {
  width:100%; padding:7px 12px; border-radius:var(--radius);
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); font-family:var(--font); font-size:12.5px; outline:none;
}
.vm-list-search input:focus { border-color:var(--accent); }
.vm-list-scroll { flex:1; overflow-y:auto; }
.vm-list-item {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px; cursor:pointer; transition:background .12s;
  border-left:3px solid transparent;
}
.vm-list-item:hover { background:var(--surface2); }
.vm-list-item.active { background:var(--accent-dim); border-left-color:var(--accent); }
.vm-list-item .vli-icon { font-size:16px; flex-shrink:0; }
.vm-list-item .vli-info { flex:1; min-width:0; }
.vm-list-item .vli-name { font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.vm-list-item .vli-sub  { font-size:10.5px; color:var(--text-muted); font-family:var(--mono); }

/* Detail panel */
.detail-panel { display:flex; flex-direction:column; gap:16px; }
.detail-header {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
  display:flex; align-items:center; gap:16px;
}
.detail-icon {
  width:48px; height:48px; border-radius:12px;
  background:var(--surface2); display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.detail-icon .material-symbols-rounded { font-size:28px; }
.detail-meta { flex:1; }
.detail-name { font-size:20px; font-weight:800; line-height:1.2; }
.detail-sub  { font-size:13px; color:var(--text-muted); margin-top:2px; }
.action-bar  { display:flex; gap:8px; flex-wrap:wrap; }

/* Charts */
.charts-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.chart-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:16px;
}
.chart-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); margin-bottom:4px; }
.chart-val   { font-size:22px; font-weight:800; font-family:var(--mono); margin-bottom:10px; }
.chart-canvas-wrap { height:80px; position:relative; }
canvas.sparkline { width:100%; height:100%; }

/* 30-min history chart */
.history-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
}
.history-card canvas { width:100%; height:160px; display:block; }

/* Snapshot tab */
.snap-list { display:flex; flex-direction:column; gap:8px; }
.snap-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-radius:var(--radius);
  background:var(--surface2); border:1px solid var(--border);
}
.snap-item-info { flex:1; }
.snap-item-name { font-size:13.5px; font-weight:600; }
.snap-item-meta { font-size:11px; color:var(--text-muted); font-family:var(--mono); margin-top:2px; }
.snap-item-desc { font-size:12px; color:var(--text-muted); margin-top:4px; }

/* Modal confirm */
.confirm-input {
  width:100%; padding:10px 14px; border-radius:var(--radius);
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); font-family:var(--mono); font-size:14px; outline:none;
  margin-top:12px;
}
.confirm-input:focus { border-color:var(--danger); }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <header class="topbar" id="topbar"></header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main" style="padding:16px">

    <div class="detail-layout" id="detail-layout">
      <!-- Left: VM list -->
      <div class="vm-list-panel">
        <div class="vm-list-header">
          <span class="material-symbols-rounded" style="font-size:16px">computer</span>
          VM &amp; Container
        </div>
        <div class="vm-list-search">
          <input type="text" id="vm-search" placeholder="Cerca per nome o ID..." oninput="filterVMs(this.value)"/>
        </div>
        <div class="vm-list-scroll" id="vm-list"></div>
      </div>

      <!-- Right: detail -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header" style="justify-content:center;color:var(--text-muted)">
          <span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim)">touch_app</span>
          <span>Seleziona una VM dalla lista</span>
        </div>
      </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay hidden" id="modal-delete">
      <div class="modal">
        <div class="modal-title" style="color:var(--danger)">
          <span class="material-symbols-rounded" style="vertical-align:middle;margin-right:6px">delete_forever</span>
          Elimina macchina virtuale
        </div>
        <div class="modal-sub">Questa azione è <b>irreversibile</b>. La VM e tutti i suoi dati verranno eliminati permanentemente.</div>
        <div>
          <label class="form-label">Digita il nome della VM per confermare:</label>
          <input type="text" class="confirm-input" id="delete-confirm-input" placeholder="nome-vm"/>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-delete')">Annulla</button>
          <button class="btn btn-danger" id="delete-confirm-btn" disabled onclick="executeDelete()">
            <span class="material-symbols-rounded">delete_forever</span> Elimina definitivamente
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay hidden" id="modal-clone">
      <div class="modal">
        <div class="modal-title">Clona VM</div>
        <div class="modal-sub">La VM verrà clonata sul nodo selezionato.</div>
        <div class="form-group">
          <label class="form-label">Nome clone</label>
          <input type="text" class="form-input" id="clone-name" placeholder="nome-clone"/>
        </div>
        <div class="form-group">
          <label class="form-label">Nodo di destinazione</label>
          <select class="form-input" id="clone-node">
            ${MOCK_DATA?.nodes?.map(n=>`<option value="${n.id}">${n.name}</option>`).join('')||''}
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-clone')">Annulla</button>
          <button class="btn btn-primary" onclick="executeClone()">
            <span class="material-symbols-rounded">content_copy</span> Clona
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay hidden" id="modal-snapshot">
      <div class="modal">
        <div class="modal-title">Nuovo Snapshot</div>
        <div class="modal-sub">Crea uno snapshot della VM corrente.</div>
        <div class="form-group">
          <label class="form-label">Nome snapshot</label>
          <input type="text" class="form-input" id="snap-name" placeholder="es. pre-update"/>
        </div>
        <div class="form-group">
          <label class="form-label">Descrizione</label>
          <input type="text" class="form-input" id="snap-desc" placeholder="Descrizione opzionale..."/>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-snapshot')">Annulla</button>
          <button class="btn btn-primary" onclick="executeSnapshot()">
            <span class="material-symbols-rounded">camera</span> Crea snapshot
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>
const session = requireAuth();
buildSidebar('vmdetail');

let activeVMId = null;
let liveIntervals = [];
let historyData = { cpu:[], mem:[], disk:[] };
const HISTORY_LEN = 30;

// Init history
function initHistory(vm) {
  historyData = { cpu:[], mem:[], disk:[] };
  for (let i=0;i<HISTORY_LEN;i++) {
    historyData.cpu.push(Math.max(0, vm.cpu + (Math.random()-0.5)*20));
    historyData.mem.push(Math.max(0, vm.mem + (Math.random()-0.5)*15));
    historyData.disk.push(vm.disk);
  }
}

// Live updates
function startLiveUpdates(vm) {
  liveIntervals.forEach(clearInterval);
  liveIntervals = [];
  const iv = setInterval(()=>{
    if (!activeVMId || vm.status !== 'running') return;
    const newCpu = Math.max(0, Math.min(100, historyData.cpu[historyData.cpu.length-1] + (Math.random()-0.5)*8));
    const newMem = Math.max(0, Math.min(100, historyData.mem[historyData.mem.length-1] + (Math.random()-0.5)*4));
    historyData.cpu.push(newCpu); if(historyData.cpu.length>HISTORY_LEN) historyData.cpu.shift();
    historyData.mem.push(newMem); if(historyData.mem.length>HISTORY_LEN) historyData.mem.shift();
    historyData.disk.push(vm.disk); if(historyData.disk.length>HISTORY_LEN) historyData.disk.shift();
    updateLiveCharts(vm);
  }, 1000);
  liveIntervals.push(iv);
}

function updateLiveCharts(vm) {
  const cpu = historyData.cpu[historyData.cpu.length-1].toFixed(1);
  const mem = historyData.mem[historyData.mem.length-1].toFixed(1);
  const cvCpu = document.getElementById('cv-cpu');
  const cvMem = document.getElementById('cv-mem');
  const cvHist = document.getElementById('cv-hist');
  const elCpu = document.getElementById('live-cpu');
  const elMem = document.getElementById('live-mem');
  if (elCpu) elCpu.textContent = cpu + '%';
  if (elMem) elMem.textContent = mem + '%';
  if (cvCpu) drawSparkline(cvCpu, historyData.cpu, 'var(--accent)');
  if (cvMem) drawSparkline(cvMem, historyData.mem, 'var(--info)');
  if (cvHist) drawHistory(cvHist);
}

function barColor(p){ return p>80?'var(--danger)':p>60?'var(--warning)':'var(--success)'; }

function drawSparkline(canvas, data, color) {
  const W=canvas.offsetWidth||200, H=canvas.offsetHeight||60;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!data.length) return;
  const mn=0, mx=100, xStep=W/(data.length-1||1);
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=i*xStep, y=H-(v-mn)/(mx-mn)*H;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  // Fill
  ctx.lineTo((data.length-1)*xStep,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=color.replace(')',',0.15)').replace('var(','rgba(').replace(')',')'); 
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, color.replace('var(--','').replace(')','') === color ? color+'33' : 'rgba(232,101,26,0.2)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle=grad; ctx.fill();
}

function drawHistory(canvas) {
  const W=canvas.offsetWidth||600, H=canvas.offsetHeight||160;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const datasets=[
    {data:historyData.cpu,  color:'#e8651a', label:'CPU'},
    {data:historyData.mem,  color:'#4d9de0', label:'RAM'},
  ];
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  [25,50,75].forEach(y=>{
    const py=H-(y/100)*H;
    ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='10px JetBrains Mono,monospace';
    ctx.fillText(y+'%',4,py-3);
  });
  datasets.forEach(ds=>{
    if(!ds.data.length) return;
    const xStep=W/(ds.data.length-1||1);
    ctx.beginPath();
    ds.data.forEach((v,i)=>{
      const x=i*xStep, y=H-(v/100)*H;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle=ds.color; ctx.lineWidth=2.5; ctx.stroke();
  });
  // Legend
  datasets.forEach((ds,i)=>{
    ctx.fillStyle=ds.color; ctx.fillRect(W-80+i*38,8,12,3);
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='10px Plus Jakarta Sans,sans-serif';
    ctx.fillText(ds.label,W-64+i*38,14);
  });
}

// Render VM list
let allVMs = MOCK_DATA.vms;
function renderVMList(filter='') {
  const items = allVMs.filter(v => !filter ||
    v.name.toLowerCase().includes(filter.toLowerCase()) ||
    String(v.id).includes(filter));
  document.getElementById('vm-list').innerHTML = items.map(vm => `
    <div class="vm-list-item ${vm.id===activeVMId?'active':''}" onclick="selectVM(${vm.id})">
      <span class="material-symbols-rounded vli-icon" style="color:${vm.status==='running'?'var(--success)':'var(--text-dim)'}">
        ${vm.type==='vm'?'computer':'deployed_code'}
      </span>
      <div class="vli-info">
        <div class="vli-name">${vm.name}</div>
        <div class="vli-sub">${vm.type.toUpperCase()} · ${vm.id} · ${vm.node}</div>
      </div>
      <span class="status-dot ${vm.status==='running'?'running':'stopped'}"></span>
    </div>`).join('');
}
function filterVMs(v){ renderVMList(v); }

function selectVM(id) {
  activeVMId = id;
  renderVMList(document.getElementById('vm-search').value);
  const vm = MOCK_DATA.vms.find(v=>v.id===id);
  if (!vm) return;
  initHistory(vm);
  renderDetail(vm);
  if (vm.status==='running') startLiveUpdates(vm);
  history.replaceState(null,'','?id='+id);
}

function renderDetail(vm) {
  const typeIcon = vm.type==='vm' ? 'computer' : 'deployed_code';
  const typeColor = vm.type==='vm' ? 'var(--info)' : '#5dd05d';
  const snaps = MOCK_DATA.snapshots[vm.id] || [];

  const actionBar = `
    ${can(session,'start')    ? `<button class="btn btn-success btn-sm" onclick="vmAction('start',${vm.id})"><span class="material-symbols-rounded">play_arrow</span> Start</button>` : ''}
    ${can(session,'stop')     ? `<button class="btn btn-danger btn-sm"  onclick="vmAction('stop',${vm.id})"><span class="material-symbols-rounded">stop</span> Stop</button>` : ''}
    ${can(session,'shutdown') ? `<button class="btn btn-secondary btn-sm" onclick="vmAction('shutdown',${vm.id})"><span class="material-symbols-rounded">power_settings_new</span> Shutdown</button>` : ''}
    ${can(session,'reboot')   ? `<button class="btn btn-secondary btn-sm" onclick="vmAction('reboot',${vm.id})"><span class="material-symbols-rounded">restart_alt</span> Reboot</button>` : ''}
    ${can(session,'clone')    ? `<button class="btn btn-secondary btn-sm" onclick="openModal('modal-clone')"><span class="material-symbols-rounded">content_copy</span> Clona</button>` : ''}
    ${can(session,'delete')   ? `<button class="btn btn-danger btn-sm"    onclick="openDelete(${vm.id})"><span class="material-symbols-rounded">delete</span> Elimina</button>` : ''}
  `;

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <div class="detail-icon" style="background:${typeColor}22">
        <span class="material-symbols-rounded" style="color:${typeColor}">${typeIcon}</span>
      </div>
      <div class="detail-meta">
        <div class="detail-name">${vm.name}</div>
        <div class="detail-sub">
          <span class="chip ${vm.type==='vm'?'chip-vm':'chip-ct'}">${vm.type.toUpperCase()}</span>
          &nbsp;ID: <span class="mono">${vm.id}</span> &nbsp;·&nbsp; Nodo: <b>${vm.node}</b> &nbsp;·&nbsp; ${vm.os}
        </div>
      </div>
      <div class="action-bar">${actionBar}</div>
    </div>

    <!-- Live charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">CPU</div>
        <div class="chart-val" id="live-cpu" style="color:var(--accent)">${vm.cpu}%</div>
        <div class="chart-canvas-wrap"><canvas class="sparkline" id="cv-cpu"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">RAM</div>
        <div class="chart-val" id="live-mem" style="color:var(--info)">${vm.mem}%</div>
        <div class="chart-canvas-wrap"><canvas class="sparkline" id="cv-mem"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Disco</div>
        <div class="chart-val" style="color:var(--warning)">${vm.disk} GB</div>
        <div class="chart-canvas-wrap"><canvas class="sparkline" id="cv-disk"></canvas></div>
      </div>
    </div>

    <!-- 30-min history -->
    <div class="history-card">
      <div class="flex items-center justify-between mb-16">
        <div>
          <div class="card-title">Storico 30 minuti</div>
          <div class="text-xs text-muted">Aggiornamento ogni secondo</div>
        </div>
        ${vm.status==='running' ? '<span class="chip chip-running">LIVE</span>' : ''}
      </div>
      <canvas id="cv-hist" style="width:100%;height:160px"></canvas>
    </div>

    <!-- Tabs: Snapshot -->
    <div class="card">
      <div class="card-header" style="justify-content:space-between">
        <div class="flex items-center gap-8">
          <span class="material-symbols-rounded" style="font-size:18px;color:var(--accent)">camera</span>
          <span class="card-title">Snapshot (${snaps.length})</span>
        </div>
        ${can(session,'start') ? `<button class="btn btn-secondary btn-sm" onclick="openModal('modal-snapshot')">
          <span class="material-symbols-rounded">add</span> Nuovo snapshot
        </button>` : ''}
      </div>
      ${snaps.length ? `<div class="snap-list">${snaps.map(s=>`
        <div class="snap-item">
          <span class="material-symbols-rounded" style="color:var(--accent);font-size:20px">camera</span>
          <div class="snap-item-info">
            <div class="snap-item-name">${s.name}</div>
            <div class="snap-item-meta">${s.date}</div>
            <div class="snap-item-desc">${s.desc}</div>
          </div>
          ${can(session,'start') ? `<div class="flex gap-8">
            <button class="btn btn-sm btn-secondary" onclick="showToast('Ripristino in corso...','info')">
              <span class="material-symbols-rounded">restore</span>
            </button>
            <button class="btn btn-sm btn-danger" onclick="showToast('Snapshot eliminato','warning')">
              <span class="material-symbols-rounded">delete</span>
            </button>
          </div>` : ''}
        </div>`).join('')}</div>` : `<div class="text-muted text-sm" style="padding:8px 0">Nessuno snapshot disponibile.</div>`}
    </div>
  `;

  // Draw initial charts
  setTimeout(()=>{
    const cvCpu  = document.getElementById('cv-cpu');
    const cvMem  = document.getElementById('cv-mem');
    const cvDisk = document.getElementById('cv-disk');
    const cvHist = document.getElementById('cv-hist');
    if(cvCpu)  drawSparkline(cvCpu,  historyData.cpu,  '#e8651a');
    if(cvMem)  drawSparkline(cvMem,  historyData.mem,  '#4d9de0');
    if(cvDisk) drawSparkline(cvDisk, historyData.disk, '#f0b030');
    if(cvHist) drawHistory(cvHist);
  }, 50);
}

function vmAction(action, id) {
  const vm = MOCK_DATA.vms.find(v=>v.id===id);
  const labels = {start:'avviata',stop:'fermata',reboot:'riavviata',shutdown:'spenta'};
  if (!vm) return;
  if(action==='start')    { vm.status='running'; startLiveUpdates(vm); }
  if(action==='stop'||action==='shutdown') vm.status='stopped';
  showToast(`${vm.name} ${labels[action]||action}`, action==='stop'||action==='shutdown'?'warning':'success');
}

let pendingDeleteId = null;
function openDelete(id) {
  pendingDeleteId = id;
  const vm = MOCK_DATA.vms.find(v=>v.id===id);
  document.getElementById('delete-confirm-input').value = '';
  document.getElementById('delete-confirm-btn').disabled = true;
  document.getElementById('delete-confirm-input').setAttribute('data-expected', vm?.name||'');
  openModal('modal-delete');
}
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('delete-confirm-input').addEventListener('input', function(){
    document.getElementById('delete-confirm-btn').disabled = (this.value !== this.getAttribute('data-expected'));
  });
});
function executeDelete() {
  const vm = MOCK_DATA.vms.find(v=>v.id===pendingDeleteId);
  if (!vm) return;
  MOCK_DATA.vms = MOCK_DATA.vms.filter(v=>v.id!==pendingDeleteId);
  allVMs = MOCK_DATA.vms;
  activeVMId = null;
  renderVMList();
  document.getElementById('detail-panel').innerHTML = '<div class="detail-header" style="justify-content:center;color:var(--text-muted)"><span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim)">touch_app</span><span>Seleziona una VM dalla lista</span></div>';
  closeModal('modal-delete');
  showToast(`VM ${vm.name} eliminata`, 'danger');
}
function executeClone() {
  const name = document.getElementById('clone-name').value||'clone-vm';
  const node = document.getElementById('clone-node').value;
  closeModal('modal-clone');
  showToast(`Clonazione di "${name}" su ${node} avviata`, 'info');
}
function executeSnapshot() {
  const name = document.getElementById('snap-name').value||'snapshot';
  const desc = document.getElementById('snap-desc').value;
  if (activeVMId) {
    if (!MOCK_DATA.snapshots[activeVMId]) MOCK_DATA.snapshots[activeVMId] = [];
    const now = new Date().toISOString().slice(0,16).replace('T',' ');
    MOCK_DATA.snapshots[activeVMId].unshift({id:'s'+Date.now(), name, date:now, desc});
    const vm = MOCK_DATA.vms.find(v=>v.id===activeVMId);
    if(vm) renderDetail(vm);
  }
  closeModal('modal-snapshot');
  showToast(`Snapshot "${name}" creato`, 'success');
}

function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// Init
const urlId = parseInt(new URLSearchParams(location.search).get('id'));
renderVMList();
if (urlId && MOCK_DATA.vms.find(v=>v.id===urlId)) selectVM(urlId);
else if (MOCK_DATA.vms.length) selectVM(MOCK_DATA.vms[0].id);
</script>
</body>
</html>
